    const title=document.getElementById('note-title').value.trim();if(!title){document.getElementById('note-title').focus();return;}
    const link=document.getElementById('note-link').value.trim(),desc=document.getElementById('note-desc').value.trim();
    const note={DestinationID:destId,Category:selNoteCatVal,Title:title,Link:link,Description:desc,Done:'FALSE',ID:Date.now().toString(36)};
    if(!DB.notes)DB.notes=[];DB.notes.push(note);setCooldown('notes');saveCache();closeSheet();renderSpace(destId);showToast('ההמלצה נוספה');
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'addNote',data:note})});}catch(e){}
}
async function toggleNote(row,destId){
    const idx=row-2;if(DB.notes&&DB.notes[idx]){
        const cur=(DB.notes[idx]['Done']||'').toUpperCase()==='TRUE';DB.notes[idx]['Done']=cur?'FALSE':'TRUE';
        setCooldown('notes');saveCache();renderSpace(destId);
    }
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'toggleNote',data:{row}})});}catch(e){}
}
async function deleteNoteItem(row,destId){
    if(!confirm('למחוק את ההמלצה?'))return;
    const idx=row-2;if(DB.notes)DB.notes.splice(idx,1);setCooldown('notes');saveCache();renderSpace(destId);showToast('ההמלצה נמחקה','🗑️');
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'deleteNote',data:{row}})});}catch(e){}
}

// ==================== ACTIVITIES ====================
function openActivityList(destId,cat){
    viewHistory.push({v:currentView,s:currentSpaceId,sec:currentSection});
    actCurrentDest=destId;actCurrentCat=cat;actFilter='all';
    currentView='activityList';currentSpaceId=null;currentSection=null;
    renderApp();
}
function renderActivityList(){
    const main=document.getElementById('main');
    const dest=DEST_MAP[actCurrentDest];
    const cs=ACT_CAT_STYLE[actCurrentCat]||{he:actCurrentCat,icon:'📍',grad:''};
    let acts=getActivitiesForDest(actCurrentDest).filter(a=>a['Category']===actCurrentCat);
    if(actFilter==='romantic')acts=acts.filter(a=>countRomanticHearts(a['Romantic ❤️'])>=4);
    else if(actFilter==='free')acts=acts.filter(a=>{const c=(a['Cost Display']||a['Cost (USD)']||'').toLowerCase();return c.includes('free')||c.includes('$0')||c.startsWith('~$0');});
    else if(actFilter==='half')acts=acts.filter(a=>(a['Duration']||'').toLowerCase().includes('half')||(a['Duration']||'').includes('2–3')||(a['Duration']||'').includes('1–2'));
    const total=getActivitiesForDest(actCurrentDest).filter(a=>a['Category']===actCurrentCat).length;
    let html=`<div class="act-list-hdr"><div class="act-list-title">${cs.icon} ${esc(cs.he)} ב${esc(dest?.name||'')}</div><div class="act-list-count">${total} אפשרויות</div></div>`;
    html+=`<div class="act-filters">
        <button class="act-fil${actFilter==='all'?' active':''}" onclick="actFilter='all';renderActivityList()">הכל</button>
        <button class="act-fil${actFilter==='romantic'?' active':''}" onclick="actFilter='romantic';renderActivityList()">רומנטי ❤️</button>
        <button class="act-fil${actFilter==='free'?' active':''}" onclick="actFilter='free';renderActivityList()">חינם</button>
        <button class="act-fil${actFilter==='half'?' active':''}" onclick="actFilter='half';renderActivityList()">חצי יום</button>
    </div>`;
    if(acts.length){
        acts.forEach((a,i)=>{
            const hearts=countRomanticHearts(a['Romantic ❤️']);
            const saved=isActivitySaved(a['Name'],actCurrentDest);
            html+=`<div class="act-card" onclick="openActivityDetail(${i})">
                <button class="act-save ${saved?'saved':''}" onclick="event.stopPropagation();saveActivityToPicks(${i})" title="שמירה">❤️</button>
                <div class="act-card-name">${esc(a['Name'])}</div>
                <div class="act-card-desc">${esc(a['Description'])}</div>
                <div class="act-card-meta">
                    ${a['Cost Display']?`<span class="act-chip">💰 ${esc(a['Cost Display'])}</span>`:''}
                    ${a['Duration']?`<span class="act-chip">⏱️ ${esc(a['Duration'])}</span>`:''}
                    ${hearts?`<span class="act-hearts">${'❤️'.repeat(hearts)}</span>`:''}
                </div>
            </div>`;
        });
    } else {
        html+=`<div class="empty"><div class="empty-icon">${cs.icon}</div>אין תוצאות בסינון הנוכחי<br><span style="font-size:12px">נסו לבחור סינון אחר</span></div>`;
    }
    main.innerHTML=html;
}
function openActivityDetail(idx){
    const a=getFilteredActs()[idx];if(!a)return;
    const cs=ACT_CAT_STYLE[a['Category']]||{he:a['Category'],icon:'📍',grad:'linear-gradient(135deg,#8E8E93,#AEAEB2)'};
    const hearts=countRomanticHearts(a['Romantic ❤️']);
    const saved=isActivitySaved(a['Name'],actCurrentDest);
    const tags=(a['Tags']||'').split(',').map(t=>t.trim()).filter(Boolean);
    const tips=a['Notes / Tips']||'';
    const maps=a['Google Maps']||'';
    const booking=a['Booking / Website']||'';
    const contact=a['Contact']||'';
    const hasContact=contact&&contact!=='—'&&contact!=='—';

    let html=`<div class="act-detail">
        <div class="act-detail-name">${esc(a['Name'])}</div>
        <div class="act-detail-pill" style="background:${cs.grad}">${cs.icon} ${esc(cs.he)}</div>
        <div class="act-detail-desc">${esc(a['Description'])}</div>
        <div class="act-detail-chips">
            ${a['Cost Display']?`<div class="act-detail-chip">💰 ${esc(a['Cost Display'])}</div>`:''}
            ${a['Duration']?`<div class="act-detail-chip">⏱️ ${esc(a['Duration'])}</div>`:''}
            ${a['Best Time']?`<div class="act-detail-chip">🕐 ${esc(a['Best Time'])}</div>`:''}
            ${hearts?`<div class="act-detail-chip">❤️ ${hearts}/5 רומנטי</div>`:''}
        </div>
        ${tips?`<div class="act-tips"><div class="act-tips-title">💡 טיפים</div>${esc(tips)}</div>`:''}
        ${tags.length?`<div class="act-tags">${tags.map(t=>`<span class="act-tag">${esc(t)}</span>`).join('')}</div>`:''}
        <div class="act-actions">
            <button id="act-save-btn" class="act-btn act-btn-save ${saved?'saved':''}" onclick="toggleActivitySave(${idx})">${saved?'✓ ברשימה':'❤️ שמירה לרשימה'}</button>
            <div class="act-btn-row">
                ${maps?`<a href="${esc(maps)}" target="_blank" class="act-btn" style="text-decoration:none">🗺️ ניווט</a>`:''}
                ${booking?`<a href="${esc(booking)}" target="_blank" class="act-btn" style="text-decoration:none">🔗 הזמנה / אתר</a>`:''}
                ${hasContact?`<a href="tel:${esc(contact)}" class="act-btn" style="text-decoration:none">📞 יצירת קשר</a>`:''}
            </div>
        </div>
    </div>`;
    openSheet(a['Name'],html);
}
function getFilteredActs(){
    const acts=getActivitiesForDest(actCurrentDest).filter(a=>a['Category']===actCurrentCat);
    if(actFilter==='romantic')return acts.filter(a=>countRomanticHearts(a['Romantic ❤️'])>=4);
    if(actFilter==='free')return acts.filter(a=>{const c=(a['Cost Display']||a['Cost (USD)']||'').toLowerCase();return c.includes('free')||c.includes('$0')||c.startsWith('~$0');});
    if(actFilter==='half')return acts.filter(a=>(a['Duration']||'').toLowerCase().includes('half')||(a['Duration']||'').includes('2–3')||(a['Duration']||'').includes('1–2'));
    return acts;
}
function updateActSaveBtn(saved){
    const btn=document.getElementById('act-save-btn');if(!btn)return;
    btn.className='act-btn act-btn-save'+(saved?' saved':'');
    btn.textContent=saved?'✓ ברשימה':'❤️ שמירה לרשימה';
}
async function toggleActivitySave(idx){
    const a=getFilteredActs()[idx];if(!a)return;
    const saved=isActivitySaved(a['Name'],actCurrentDest);
    if(saved){
        if(!confirm('להסיר מהרשימה?'))return;
        // Find the note row matching this activity name
        const note=(DB.notes||[]).find(n=>n['DestinationID']===actCurrentDest&&n['Title']===a['Name']);
        if(!note)return;
        const idxInDB=DB.notes.indexOf(note);const row=idxInDB+2;
        DB.notes.splice(idxInDB,1);setCooldown('notes');saveCache();
        updateActSaveBtn(false);renderActivityList();
        showToast('הוסר מהרשימה','🗑️');
        try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'deleteNote',data:{row}})});}catch(e){}
    } else {
        const desc=[(a['Cost Display']||''),(a['Duration']||''),((a['Description']||'').substring(0,100))].filter(Boolean).join(' | ');
        const note={DestinationID:actCurrentDest,Category:'Visit',Title:a['Name'],Link:a['Google Maps']||'',Description:desc,Done:'FALSE',ID:Date.now().toString(36)};
        if(!DB.notes)DB.notes=[];DB.notes.push(note);setCooldown('notes');saveCache();
        updateActSaveBtn(true);renderActivityList();
        showToast('נשמר לרשימה ❤️','❤️');
        try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'addNote',data:note})});}catch(e){}
    }
}
async function saveActivityToPicks(idx){
    // Heart button on activity card in list — delegates to toggle for consistency
    toggleActivitySave(idx);
}

// ==================== SYNC & REFRESH ====================
async function refreshData(showIndicator){
    const refreshBtn=document.querySelector('.hdr-refresh');
    if(showIndicator&&refreshBtn)refreshBtn.classList.add('refreshing');
    const success=await fetchAllData();
    if(success){
        if(currentView==='home')renderMarketplace();
        else if(currentView==='space')renderSpace(currentSpaceId);
        else if(currentView==='activityList')renderActivityList();
        else if(currentView==='section')renderSection(currentSection);
    }
    if(showIndicator){
        if(refreshBtn)setTimeout(()=>refreshBtn.classList.remove('refreshing'),400);
        showToast('הנתונים עודכנו','↻');
    }
    return success;
}
setInterval(()=>refreshData(false),60000);

// ==================== EXCHANGE RATES ====================
async function fetchRates(){
    try{const r=await fetch('https://open.er-api.com/v6/latest/USD');const d=await r.json();
    if(d.result==='success'){exchangeRates=d.rates;ratesLastUpdated=d.time_last_update_utc;}}catch(e){}
}

// ==================== INIT ====================
async function init(){
    const hadCache=loadCache();
    const hadActCache=loadActivitiesCache();
    if(hadCache)renderMarketplace();
    else document.getElementById('main').innerHTML='<div class="loading" style="padding-top:80px"><div class="spinner"></div><div>טוענים את הטיול...</div></div>';
    await Promise.all([fetchRates(),fetchWeather()]);
    const success=await fetchAllData();
    if(success||hadCache){renderApp();}
    // Always fetch activities — cache is fallback, fresh data is primary source.
    // fetchActivities() will re-render current space when data arrives.
    fetchActivities();
}
init();
</script>
