<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>הפיליפינים 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pri:#0d9488;--pri-d:#0f766e;--pri-l:#5eead4;--acc:#f97316;--acc-l:#fdba74;--bg:#f5f5f4;--card:#fff;--text:#1c1917;--text-l:#78716c;--text-m:#a8a29e;--border:#e7e5e4;--ok:#10b981;--err:#ef4444;--warn:#f59e0b;--sh:0 1px 3px rgba(0,0,0,.08);--sh-md:0 4px 12px rgba(0,0,0,.08);--sh-lg:0 8px 24px rgba(0,0,0,.12);--r:16px;--rs:10px;--hdr:56px;--nav:64px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
/* ===== APP HEADER ===== */
.app-hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:var(--card);display:flex;align-items:center;padding:0 16px;z-index:50;border-bottom:1px solid var(--border);gap:12px}
.hdr-back{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;color:var(--text);display:none;font-family:inherit;line-height:1}
.hdr-title{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-menu{background:none;border:none;font-size:22px;cursor:pointer;padding:4px;color:var(--text)}
.hdr-refresh{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:var(--text-l)}
/* ===== MAIN ===== */
.main{padding-top:var(--hdr);padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom));min-height:100vh;transition:opacity .15s ease}
.main.fading{opacity:0}
/* ===== BOTTOM NAV ===== */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);padding-bottom:env(safe-area-inset-bottom);background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;z-index:50;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;border:none;background:none;font-family:inherit;font-size:10px;color:var(--text-l);cursor:pointer;border-radius:var(--rs);transition:.2s;min-width:48px}
.bnav-item .bi{font-size:22px;line-height:1}
.bnav-item.active{color:var(--pri);background:rgba(13,148,136,.06)}
/* ===== SIDEBAR ===== */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px)}
.sb-overlay.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;right:-280px;width:280px;height:100%;background:var(--card);z-index:100;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:var(--sh-lg);display:flex;flex-direction:column}
.sidebar.open{right:0}
.sb-hdr{padding:24px 20px 16px;background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff}
.sb-hdr h2{font-size:18px;font-weight:700}
.sb-hdr p{font-size:12px;opacity:.8;margin-top:2px}
.sb-items{flex:1;overflow-y:auto;padding:8px 0}
.sb-item{display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;font-family:inherit;text-align:right}
.sb-item:active{background:rgba(13,148,136,.06)}
.sb-item .si{font-size:20px;width:28px;text-align:center}
.sb-close{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* ===== MARKETPLACE ===== */
.mk-countdown{text-align:center;padding:12px 16px;font-size:13px;color:var(--pri-d);font-weight:600;background:linear-gradient(135deg,rgba(13,148,136,.06),rgba(13,148,136,.02))}
.mk-hero{margin:12px 16px;border-radius:var(--r);overflow:hidden;position:relative;height:220px;cursor:pointer;box-shadow:var(--sh-md)}
.mk-hero-img{width:100%;height:100%;object-fit:cover}
.mk-hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.1) 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
.mk-hero-badge{display:inline-flex;align-items:center;gap:4px;background:var(--acc);color:#fff;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-bottom:8px;align-self:flex-start}
.mk-hero-name{font-size:28px;font-weight:800;color:#fff}
.mk-hero-dates{font-size:13px;color:rgba(255,255,255,.85);margin-top:2px}
.mk-hero-weather{font-size:13px;color:rgba(255,255,255,.9);margin-top:4px}
.mk-hero-cta{font-size:12px;color:var(--pri-l);font-weight:600;margin-top:8px}
.mk-section-title{font-size:15px;font-weight:700;padding:16px 16px 10px;color:var(--text)}
.mk-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.mk-scroll::-webkit-scrollbar{display:none}
.mk-card{flex:0 0 140px;height:180px;border-radius:var(--rs);overflow:hidden;position:relative;cursor:pointer;box-shadow:var(--sh)}
.mk-card-img{width:100%;height:100%;object-fit:cover}
.mk-card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.05) 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px}
.mk-card-name{font-size:15px;font-weight:700;color:#fff}
.mk-card-dates{font-size:10px;color:rgba(255,255,255,.8);margin-top:2px}
.mk-card-weather{font-size:11px;color:rgba(255,255,255,.9);margin-top:3px}
.mk-card.current{outline:2px solid var(--acc);outline-offset:2px}
.mk-budget{margin:0 16px 16px;background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid var(--border)}
.mk-budget-title{font-size:13px;font-weight:600;color:var(--text-l);margin-bottom:10px}
.mk-budget-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mk-budget-stat{text-align:center}
.mk-budget-val{font-size:17px;font-weight:700}
.mk-budget-lbl{font-size:10px;color:var(--text-l);margin-top:2px}
/* ===== DESTINATION SPACE ===== */
.sp-banner{position:relative;height:200px;overflow:hidden}
.sp-banner-img{width:100%;height:100%;object-fit:cover}
.sp-banner-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,rgba(0,0,0,.1) 50%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
.sp-banner-name{font-size:28px;font-weight:800;color:#fff}
.sp-banner-info{font-size:13px;color:rgba(255,255,255,.85);margin-top:4px}
.sp-banner-weather{font-size:14px;color:#fff;margin-top:6px}
.sp-section{padding:16px}
.sp-section-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
/* ===== GENERIC CARDS & LISTS ===== */
.g-card{background:var(--card);border-radius:var(--rs);padding:14px;margin-bottom:8px;box-shadow:var(--sh);border:1px solid var(--border)}
.g-card-title{font-size:14px;font-weight:600}
.g-card-sub{font-size:12px;color:var(--text-l);margin-top:2px}
.g-card-meta{display:flex;gap:8px;margin-top:8px;font-size:11px;color:var(--text-l)}
.g-card-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.section-view{padding:16px}
.section-view-title{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
/* ===== FLIGHT CARD ===== */
.fl-card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh);border:1px solid var(--border)}
.fl-route{display:flex;align-items:center;justify-content:space-between;margin:10px 0}
.fl-point{text-align:center}
.fl-code{font-size:24px;font-weight:800}
.fl-time{font-size:13px;font-weight:600;color:var(--pri-d);margin-top:2px}
.fl-line{flex:1;display:flex;align-items:center;justify-content:center;padding:0 12px;position:relative}
.fl-line::before{content:'';position:absolute;top:50%;left:12px;right:12px;height:2px;background:linear-gradient(to left,var(--pri),var(--border));border-radius:1px}
.fl-line .plane{font-size:18px;position:relative;z-index:1;background:var(--card);padding:0 4px;transform:scaleX(-1)}
.fl-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:10px;border-top:1px solid var(--border);margin-top:8px}
.fl-detail{text-align:center}
.fl-detail-lbl{font-size:10px;color:var(--text-l);text-transform:uppercase}
.fl-detail-val{font-size:13px;font-weight:600;margin-top:1px}
/* ===== HOTEL CARD ===== */
.ht-card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh);border:1px solid var(--border)}
.ht-dates{display:flex;gap:10px;margin:10px 0}
.ht-date{flex:1;background:var(--bg);border-radius:var(--rs);padding:8px 10px;text-align:center}
.ht-date-lbl{font-size:10px;color:var(--text-l)}
.ht-date-val{font-size:13px;font-weight:600;margin-top:2px}
.ht-link{display:inline-flex;align-items:center;gap:4px;color:var(--pri);font-size:12px;font-weight:500;text-decoration:none;padding:6px 12px;background:rgba(13,148,136,.06);border-radius:8px;margin-top:6px}
/* ===== NOTES (DANI'S PICKS) ===== */
.note-card{display:flex;align-items:flex-start;gap:10px;background:var(--card);border-radius:var(--rs);padding:12px 14px;margin-bottom:6px;border:1px solid var(--border);box-shadow:var(--sh)}
.note-check{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;margin-top:2px}
.note-card.done .note-check{background:var(--ok);border-color:var(--ok)}
.note-card.done .note-check::after{content:'';width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.note-card.done .note-info{opacity:.45;text-decoration:line-through}
.note-icon{font-size:20px;flex:0 0 auto}
.note-info{flex:1;min-width:0}
.note-title{font-size:13px;font-weight:600}
.note-title a{color:var(--pri);text-decoration:none}
.note-desc{font-size:11px;color:var(--text-l);margin-top:2px}
.note-del{background:none;border:none;color:var(--text-m);font-size:16px;cursor:pointer;padding:2px;opacity:.5}
.note-del:active{opacity:1;color:var(--err)}
/* ===== BUDGET SECTION ===== */
.bgt-progress{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.bgt-progress-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.bgt-progress-title{font-size:13px;font-weight:600;color:var(--text-l)}
.bgt-gear{background:none;border:none;font-size:16px;cursor:pointer;padding:2px}
.bgt-amounts{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.bgt-spent{font-size:26px;font-weight:800}
.bgt-limit{font-size:13px;color:var(--text-l)}
.bgt-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bgt-fill{height:100%;border-radius:4px;transition:width .4s}
.bgt-fill.g{background:linear-gradient(90deg,#10b981,#34d399)}.bgt-fill.o{background:linear-gradient(90deg,#f59e0b,#fbbf24)}.bgt-fill.r{background:linear-gradient(90deg,#ef4444,#f87171)}
.bgt-pct{font-size:11px;color:var(--text-l);text-align:left;margin-top:4px}
.bgt-warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--err);font-weight:600;text-align:center;display:none}
.bgt-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.bgt-sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center}
.bgt-sum-lbl{font-size:10px;color:var(--text-l);margin-bottom:3px}
.bgt-sum-val{font-size:16px;font-weight:700}
.bgt-sum-sub{font-size:10px;color:var(--text-l);margin-top:2px}
.bgt-chart{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.bgt-chart-title{font-size:12px;color:var(--text-l);font-weight:600;margin-bottom:8px}
.bgt-chart-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;background:var(--border);margin-bottom:8px}
.bgt-chart-seg{height:100%;min-width:2px}
.bgt-chart-legend{display:flex;flex-wrap:wrap;gap:4px 12px}
.bgt-chart-item{display:flex;align-items:center;gap:4px;font-size:10px}
.bgt-chart-dot{width:7px;height:7px;border-radius:50%}
/* ===== FORM COMPONENTS ===== */
.frm-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.frm-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.frm-cancel{background:none;border:none;color:var(--err);font-size:12px;cursor:pointer;font-family:inherit;display:none}
.frm-row{display:flex;gap:8px;margin-bottom:8px}
.frm-row input,.frm-row select{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;background:var(--card);outline:none;direction:rtl;transition:border-color .2s;min-width:0}
.frm-row input:focus,.frm-row select:focus{border-color:var(--pri)}
.frm-row .amt{font-size:18px;font-weight:600;text-align:center;flex:1.5}
.frm-row .cur{flex:0 0 85px;font-weight:600;text-align:center}
.frm-row .dt{flex:0 0 135px;direction:ltr}
.frm-conv{font-size:11px;color:var(--text-l);text-align:center;padding:2px 0 6px;min-height:16px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.cat-btn{padding:7px 4px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);font-family:inherit;font-size:10px;cursor:pointer;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:1px}
.cat-btn.active{border-color:var(--pri);background:rgba(13,148,136,.05);color:var(--pri);font-weight:600}
.cat-btn .ci{font-size:16px}
.who-row{display:flex;gap:6px;margin-bottom:10px}
.who-btn{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:.15s;color:var(--text-l)}
.who-btn.active{border-color:var(--pri);background:rgba(13,148,136,.05);color:var(--pri);font-weight:600}
.submit-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .2s}
.submit-btn:active{opacity:.9}
.submit-btn.editing{background:linear-gradient(135deg,var(--acc),var(--acc-l))}
/* ===== EXPENSE CARD ===== */
.exp-card{background:var(--card);border-radius:var(--rs);margin-bottom:6px;border:1px solid var(--border);overflow:hidden}
.exp-card.pre{border-right:3px solid var(--pri)}
.exp-main{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}
.exp-icon{font-size:18px;width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.exp-info{flex:1;min-width:0}
.exp-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:10px;color:var(--text-l);margin-top:1px;display:flex;gap:4px}
.exp-tag{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;background:rgba(13,148,136,.08);color:var(--pri)}
.exp-amounts{text-align:left}
.exp-primary{font-size:14px;font-weight:700;white-space:nowrap}
.exp-secondary{font-size:9px;color:var(--text-l);white-space:nowrap}
.exp-detail{display:none;padding:0 14px 10px;border-top:1px dashed var(--border)}
.exp-detail.open{display:block;padding-top:8px}
.exp-currencies{display:flex;gap:10px;margin-bottom:8px;direction:ltr}
.exp-curr{text-align:center;flex:1}
.exp-curr-val{font-size:13px;font-weight:600}
.exp-curr-lbl{font-size:9px;color:var(--text-l)}
.exp-actions{display:flex;gap:6px}
.exp-actions button{flex:1;padding:7px;border:1px solid var(--border);border-radius:6px;background:var(--card);font-family:inherit;font-size:11px;cursor:pointer}
/* ===== FILTER PILLS ===== */
.filters{display:flex;gap:5px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fil-btn{flex:0 0 auto;padding:5px 10px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);font-family:inherit;font-size:11px;font-weight:500;color:var(--text-l);cursor:pointer;transition:.2s;white-space:nowrap}
.fil-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
/* ===== TASKS ===== */
.todo-wrap{display:flex;gap:8px;margin-bottom:14px}
.todo-inp{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:13px;background:var(--card);outline:none;direction:rtl}
.todo-inp:focus{border-color:var(--pri)}
.todo-add{padding:11px 16px;background:var(--pri);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.todo-prog{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:var(--text-l)}
.todo-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.todo-bar-fill{height:100%;background:linear-gradient(to left,var(--ok),#34d399);border-radius:3px;transition:width .3s}
.todo-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-radius:var(--rs);margin-bottom:6px;border:1px solid var(--border)}
.todo-item.done{opacity:.45}
.todo-item.done .todo-text{text-decoration:line-through}
.todo-chk{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:.2s;background:var(--card)}
.todo-item.done .todo-chk{background:var(--ok);border-color:var(--ok)}
.todo-chk::after{content:'';display:none;width:5px;height:9px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}
.todo-item.done .todo-chk::after{display:block}
.todo-text{flex:1;font-size:13px}
.todo-due{font-size:10px;color:var(--text-l)}.todo-due.overdue{color:var(--err);font-weight:600}
.todo-del{background:none;border:none;color:var(--text-m);font-size:16px;cursor:pointer;padding:2px;opacity:.4}
/* ===== PACKING ===== */
.pack-summary{text-align:center;padding:12px;font-size:14px;font-weight:600;color:var(--pri-d);background:linear-gradient(135deg,rgba(13,148,136,.06),rgba(13,148,136,.02));border-radius:var(--rs);margin-bottom:12px}
.pack-summary.done{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(16,185,129,.02));color:var(--ok)}
.pack-add-form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.pack-add-row{display:flex;gap:8px;margin-bottom:10px}
.pack-add-inp{flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:14px;background:var(--card);outline:none;direction:rtl;min-width:0}
.pack-add-inp:focus{border-color:var(--pri)}
.pack-add-btn{padding:12px 18px;background:linear-gradient(135deg,var(--ok),#34d399);color:#fff;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.pack-add-btn:active{opacity:.85}
.pack-sel-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.pack-sel-btn{padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-family:inherit;font-size:10px;cursor:pointer;text-align:center;transition:.15s;display:flex;align-items:center;gap:3px;white-space:nowrap}
.pack-sel-btn.active{border-color:var(--pri);background:rgba(13,148,136,.06);color:var(--pri);font-weight:600}
.pack-sel-label{font-size:10px;color:var(--text-l);font-weight:600;margin-bottom:4px}
.pack-tabs{display:flex;gap:3px;margin-bottom:14px;background:var(--border);border-radius:10px;padding:3px}
.pack-tab{flex:1;padding:8px 4px;border:none;border-radius:8px;background:none;font-family:inherit;font-size:11px;font-weight:500;color:var(--text-l);cursor:pointer;transition:.2s;white-space:nowrap}
.pack-tab.active{background:var(--card);color:var(--text);box-shadow:var(--sh);font-weight:600}
.pack-cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border-radius:var(--rs) var(--rs) 0 0;border:1px solid var(--border);border-bottom:none;cursor:pointer}
.pack-cat-hdr h3{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.pack-cat-cnt{font-size:11px;color:var(--text-l);background:var(--bg);padding:2px 8px;border-radius:8px}
.pack-cat-hdr .chevron{font-size:12px;color:var(--text-l);transition:transform .2s}
.pack-cat-hdr.collapsed .chevron{transform:rotate(-90deg)}
.pack-cat-items{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rs) var(--rs);overflow:hidden;margin-bottom:10px;transition:max-height .25s ease}
.pack-cat-items.collapsed{max-height:0 !important;border:none;margin-bottom:0}
.pack-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;position:relative;transition:opacity .2s,background .15s}
.pack-item:last-child{border-bottom:none}
.pack-item.done{opacity:.45}
.pack-item.done .pack-txt{text-decoration:line-through}
.pack-item.removing{opacity:0;transform:translateX(-40px);transition:all .3s ease}
.pack-item.new-item{animation:packSlideIn .3s ease}
@keyframes packSlideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.pack-chk{width:22px;height:22px;border:2px solid var(--border);border-radius:5px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.2s;cursor:pointer}
.pack-item.done .pack-chk{background:var(--ok);border-color:var(--ok)}
.pack-item.done .pack-chk::after{content:'';width:5px;height:9px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}
.pack-txt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pack-who-badge{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:600;flex:0 0 auto;white-space:nowrap}
.pack-who-badge.tom{background:rgba(59,130,246,.1);color:#3b82f6}
.pack-who-badge.dani{background:rgba(236,72,153,.1);color:#ec4899}
.pack-who-badge.shared{background:rgba(139,92,246,.1);color:#8b5cf6}
.pack-item-actions{display:flex;gap:4px;flex:0 0 auto}
.pack-act-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;line-height:1}
.pack-act-btn:active{background:var(--border)}
.pack-edit-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;background:rgba(13,148,136,.03);border-bottom:1px solid var(--border)}
.pack-edit-inp{flex:1;min-width:120px;padding:8px 10px;border:1.5px solid var(--pri);border-radius:8px;font-family:inherit;font-size:13px;outline:none;direction:rtl;background:var(--card)}
.pack-edit-sel{padding:8px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:11px;background:var(--card);outline:none}
.pack-edit-save{padding:8px 14px;background:var(--pri);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
.pack-edit-cancel{padding:8px 14px;background:var(--border);color:var(--text);border:none;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer}
.pack-item.critical{border-right:3px solid var(--err)}
.pack-critical-dot{font-size:10px;flex:0 0 auto;line-height:1}
.pack-crit-toggle{padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-family:inherit;font-size:11px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.pack-crit-toggle.active{border-color:var(--err);background:rgba(239,68,68,.06);color:var(--err);font-weight:600}
.pack-cat-reorder{display:flex;gap:2px;margin-right:auto;margin-left:8px}
.pack-cat-reorder button{background:none;border:none;font-size:10px;color:var(--text-m);cursor:pointer;padding:2px 4px;border-radius:4px;line-height:1;transition:color .15s}
.pack-cat-reorder button:active{color:var(--pri)}
/* ===== CONVERTER ===== */
.conv-card{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--border)}
.conv-row{display:flex;gap:8px;margin-bottom:10px}
.conv-inp{flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:var(--rs);font-size:16px;font-family:inherit;font-weight:600;background:var(--bg);color:var(--text);direction:ltr;text-align:right;outline:none}
.conv-inp:focus{border-color:var(--pri)}
.conv-sel{padding:10px 12px;border:2px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;font-weight:600;background:var(--bg);color:var(--text);cursor:pointer;min-width:90px;outline:none}
.conv-swap{display:flex;justify-content:center;margin-bottom:10px}
.conv-swap button{background:linear-gradient(135deg,var(--pri),var(--pri-d));color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer}
.conv-result{background:var(--bg);border-radius:var(--rs);padding:14px;text-align:center;margin-bottom:10px}
.conv-result-amt{font-size:28px;font-weight:800;color:var(--pri);direction:ltr}
.conv-result-lbl{font-size:12px;color:var(--text-l);margin-top:2px}
.conv-quick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.conv-quick-btn{flex:1;min-width:55px;padding:7px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--card);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
.conv-rate{font-size:11px;color:var(--text-l);text-align:center}
/* ===== EMERGENCY ===== */
.emg-card{background:var(--card);border-radius:var(--rs);padding:14px;margin-bottom:8px;border:1px solid var(--border);border-right:3px solid var(--err)}
.emg-title{font-size:14px;font-weight:700;margin-bottom:3px}
.emg-val{font-size:13px;color:var(--text-l);line-height:1.4}
.emg-phone{display:inline-flex;align-items:center;gap:4px;color:var(--pri);font-weight:600;text-decoration:none;font-size:15px}
/* ===== TOAST & MODAL ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:500;z-index:200;opacity:0;transition:.3s;pointer-events:none;font-family:inherit}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal{background:var(--card);border-radius:var(--r);padding:24px;max-width:320px;width:100%;box-shadow:var(--sh-lg)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:14px}
.modal input{width:100%;padding:12px;border:2px solid var(--border);border-radius:var(--rs);font-family:inherit;font-size:18px;font-weight:600;text-align:center;outline:none;background:var(--bg);direction:ltr;margin-bottom:14px}
.modal input:focus{border-color:var(--pri)}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.modal-save{background:var(--pri);color:#fff}
.modal-cancel-btn{background:var(--border);color:var(--text)}
/* ===== LINK ITEM ===== */
.link-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-radius:var(--rs);margin-bottom:6px;border:1px solid var(--border);text-decoration:none;color:inherit}
.link-icon{width:38px;height:38px;background:rgba(13,148,136,.06);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
.link-info{flex:1}
.link-title{font-size:14px;font-weight:600}
.link-desc{font-size:11px;color:var(--text-l);margin-top:1px}
/* ===== NOTE ADD FORM ===== */
.note-form{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-top:10px}
.note-cat-row{display:flex;gap:5px;margin-bottom:8px}
.note-cat-btn{flex:1;padding:7px;border:1.5px solid var(--border);border-radius:8px;background:var(--card);font-family:inherit;font-size:11px;cursor:pointer;text-align:center;transition:.15s}
.note-cat-btn.active{border-color:var(--pri);background:rgba(13,148,136,.05);color:var(--pri);font-weight:600}
.note-inp{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--card);outline:none;direction:rtl;margin-bottom:6px}
.note-inp:focus{border-color:var(--pri)}
/* ===== MISC ===== */
.empty{text-align:center;padding:24px;color:var(--text-l);font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:var(--text-l)}
.last-upd{font-size:10px;color:var(--text-m);text-align:center;margin-top:10px}
/* ===== DARK MODE ===== */
@media(prefers-color-scheme:dark){
:root{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--text-l:#94a3b8;--text-m:#64748b;--border:#334155}
.app-hdr{background:#1e293b;border-bottom-color:#334155}
.bnav{background:#1e293b;border-top-color:#334155}
.sidebar{background:#1e293b}
.frm-row input,.frm-row select,.todo-inp,.conv-inp,.conv-sel,.note-inp,.modal input{background:#0f172a;color:var(--text)}
.cat-btn,.who-btn,.fil-btn,.note-cat-btn,.conv-quick-btn{background:#1e293b}
.pack-tabs{background:#334155}.pack-tab.active{background:#1e293b}
.pack-chk,.todo-chk,.note-check{background:#1e293b}
.pack-add-inp,.pack-edit-inp,.pack-edit-sel{background:#0f172a;color:var(--text)}
.pack-sel-btn{background:#1e293b}
.ht-date{background:#0f172a}
.conv-result{background:#0f172a}
.fl-line::before{background:linear-gradient(to left,var(--pri),#334155)}
.modal{background:#1e293b}.modal-cancel-btn{background:#334155}
}
</style>
</head>

<script>
// ==================== CONFIG ====================
const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSO2YnQmzCIadMgeC25xtz-BZHHnxIpOxvUaYigbW3dSD7ODcNzortdwUSSw9E8qh4NCgRMN4P7JV4C/pub';
const TABS = {
    flights:   { gid: '1240829354' },
    hotels:    { gid: '935661237' },
    expenses:  { gid: '1296829800' },
    tasks:     { gid: '714932989' },
    links:     { gid: '2130634285' },
    emergency: { gid: '476610190' },
    packing:   { gid: '414706764' },
    notes:     { gid: '1435746619' },
};
const TRIP_START = new Date('2026-04-05T15:40:00+02:00');
let BUDGET_LIMIT = parseInt(localStorage.getItem('ph-budget-limit')) || 15000;
const CACHE_KEY = 'ph-trip-cache-v3';
const WEATHER_KEY = 'ph-weather-cache';
const DEFAULT_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzU1HaG0zdzaNNbhSXBnwTjEZ1ZgunpIdyvP1g107vVhag7biVLygglNOMIKsusSHrXzA/exec';
const APPS_SCRIPT_URL = localStorage.getItem('ph-apps-script-url') || DEFAULT_APPS_SCRIPT_URL;

// ==================== DESTINATIONS ====================
const DESTS = [
    { id:'manila-1', name:'מנילה', en:'Manila', start:'2026-04-07', end:'2026-04-08', lat:14.5995, lon:120.9842, img:'https://images.unsplash.com/photo-1573455494060-c5595004fb6c?w=800' },
    { id:'siargao', name:'שירגאו', en:'Siargao', start:'2026-04-08', end:'2026-04-17', lat:9.8482, lon:126.0458, img:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800' },
    { id:'el-nido', name:'אל נידו', en:'El Nido', start:'2026-04-17', end:'2026-04-23', lat:11.1784, lon:119.3906, img:'https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?w=800' },
    { id:'boracay', name:'בורקאי', en:'Boracay', start:'2026-04-23', end:'2026-04-26', lat:11.9674, lon:121.9248, img:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800' },
    { id:'manila-2', name:'מנילה (חזרה)', en:'Manila Return', start:'2026-04-26', end:'2026-04-27', lat:14.5995, lon:120.9842, img:'https://images.unsplash.com/photo-1573455494060-c5595004fb6c?w=800' },
];
const DEST_MAP = {}; DESTS.forEach(d => DEST_MAP[d.id] = d);

function getNights(d) { return Math.round((new Date(d.end) - new Date(d.start)) / 86400000); }
function fmtDestDates(d) {
    const s = new Date(d.start), e = new Date(d.end);
    return `${s.getDate()}-${e.getDate()} באפריל`;
}
function getCurrentDest() {
    const now = new Date();
    for (const d of DESTS) { if (now >= new Date(d.start) && now < new Date(d.end)) return d; }
    if (now < new Date(DESTS[0].start)) return DESTS[0];
    return DESTS[DESTS.length - 1];
}
function getDestForDate(dateStr) {
    const p = dateStr.split('/');
    if (p.length < 2) return null;
    const day = parseInt(p[0]), month = parseInt(p[1]), year = p[2] ? parseInt(p[2]) : 2026;
    const d = new Date(year, month - 1, day);
    for (const dest of DESTS) { if (d >= new Date(dest.start) && d < new Date(dest.end)) return dest.id; }
    return null;
}
function getFlightsForDest(destId) {
    if (!DB.flights) return [];
    const dest = DEST_MAP[destId]; if (!dest) return [];
    const start = new Date(dest.start), end = new Date(dest.end);
    const dayBefore = new Date(start); dayBefore.setDate(dayBefore.getDate() - 1);
    return DB.flights.filter(f => {
        const dd = f['Departure Date'];
        if (!dd) return false;
        const p = dd.split('/');
        const fd = new Date(2026, parseInt(p[1])-1, parseInt(p[0]));
        return fd >= dayBefore && fd <= end;
    });
}
function getHotelsForDest(destId) {
    if (!DB.hotels) return [];
    const dest = DEST_MAP[destId]; if (!dest) return [];
    const start = new Date(dest.start), end = new Date(dest.end);
    return DB.hotels.filter(h => {
        const ci = h['Check-in'];
        if (!ci) return false;
        const p = ci.split('/');
        const hd = new Date(2026, parseInt(p[1])-1, parseInt(p[0]));
        return hd >= start && hd < end;
    });
}
function getExpensesForDest(destId) {
    if (!DB.expenses) return [];
    return DB.expenses.filter((e, i) => {
        const d = e['Date'] || '';
        return getDestForDate(d) === destId;
    }).map((e, i) => ({ ...e, _origIdx: DB.expenses.indexOf(e) }));
}
function getNotesForDest(destId) {
    if (!DB.notes) return [];
    return DB.notes.filter(n => n['DestinationID'] === destId).map((n, i) => ({ ...n, _row: DB.notes.indexOf(n) + 2 }));
}

// ==================== STATE ====================
const DB = {};
let exchangeRates = null;
let ratesLastUpdated = null;
let dataFetchedAt = null;
const writeCooldowns = {};
function setCooldown(tab) { writeCooldowns[tab] = Date.now(); }
function isInCooldown(tab) { return writeCooldowns[tab] && (Date.now() - writeCooldowns[tab] < 120000); }

let currentView = 'home';
let currentSpaceId = null;
let currentSection = null;
let viewHistory = [];
let weatherData = {};

// Expense state
const PRE_TRIP_CATS = ['לינה','טיסות','ביורוקרטיה'];
const ON_TRIP_CATS = ['אוכל','תחבורה','אטרקציות','קניות','משיכת כסף','שונות'];
const ALL_CATS = [
    {id:'אוכל',icon:'🍜',label:'אוכל',color:'#f59e0b'},
    {id:'תחבורה',icon:'🚕',label:'תחבורה',color:'#4a9eed'},
    {id:'אטרקציות',icon:'🏝️',label:'אטרקציות',color:'#22c55e'},
    {id:'קניות',icon:'🛍️',label:'קניות',color:'#8b5cf6'},
    {id:'משיכת כסף',icon:'🏧',label:'משיכת כסף',color:'#0d9488'},
    {id:'שונות',icon:'📦',label:'שונות',color:'#a855f7'},
    {id:'לינה',icon:'🏨',label:'לינה',color:'#0ea5e9'},
    {id:'טיסות',icon:'✈️',label:'טיסות',color:'#06b6d4'},
    {id:'ביורוקרטיה',icon:'📋',label:'ביורוקרטיה',color:'#64748b'},
];
const CAT_MAP = {}; ALL_CATS.forEach(c => CAT_MAP[c.id] = c);
let expFilter = 'all', editExpIdx = null, selCat = 'אוכל', selWho = 'Both';

// ==================== CSV PARSER ====================
function parseCSV(text) {
    const rows = []; let current = '', inQ = false; const chars = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n'); let row = [];
    for (let i = 0; i < chars.length; i++) {
        const c = chars[i];
        if (inQ) { if (c==='"'&&chars[i+1]==='"'){current+='"';i++;}else if(c==='"'){inQ=false;}else{current+=c;} }
        else { if(c==='"'){inQ=true;}else if(c===','){row.push(current.trim());current='';}else if(c==='\n'){row.push(current.trim());if(row.some(v=>v))rows.push(row);row=[];current='';}else{current+=c;} }
    }
    if(current||row.length){row.push(current.trim());if(row.some(v=>v))rows.push(row);}
    if(rows.length<2)return[];
    const headers=rows[0];
    return rows.slice(1).map(r=>{const obj={};headers.forEach((h,i)=>{obj[h]=r[i]||'';});return obj;});
}

// ==================== DATA FETCHING ====================
function tabURL(tab){return `${SHEET_BASE}?gid=${TABS[tab].gid}&single=true&output=csv&_=${Date.now()}`;}
async function fetchTab(name){const r=await fetch(tabURL(name));if(!r.ok)throw new Error(r.status);return parseCSV(await r.text());}
function loadCache(){try{const r=localStorage.getItem(CACHE_KEY);if(r){const c=JSON.parse(r);Object.assign(DB,c.data);dataFetchedAt=c.ts;return true;}}catch(e){}return false;}
function saveCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:DB,ts:Date.now()}));}catch(e){}}
async function fetchAllData(){
    const names=Object.keys(TABS).filter(n=>TABS[n].gid!=='0');
    const fetchNames=names.filter(n=>!isInCooldown(n));
    if(!fetchNames.length)return false;
    const results=await Promise.allSettled(fetchNames.map(n=>fetchTab(n)));
    let ok=false;
    results.forEach((r,i)=>{if(r.status==='fulfilled'){DB[fetchNames[i]]=r.value;ok=true;}});
    if(ok){dataFetchedAt=Date.now();saveCache();}
    return ok;
}

// ==================== HELPERS ====================
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
function formatDate(s){if(!s)return'';const p=s.split('/');return p.length>=2?p[0]+'/'+p[1]:s;}
function extractCode(p){const m=p.match(/\(([A-Z]{3})\)/);return m?m[1]:p.substring(0,3).toUpperCase();}
function parsePriceNum(s){return parseFloat(String(s||'').replace(/[^0-9.\-]/g,''))||0;}
function fmtMoney(n,c){const s={ILS:'₪',USD:'$',PHP:'₱'}[c]||'₪';return s+Math.round(n).toLocaleString();}
function convertToILS(a,c){if(!exchangeRates||c==='ILS')return a;return(a/(exchangeRates[c]||1))*(exchangeRates['ILS']||1);}
function convertFromILS(a,c){if(!exchangeRates||c==='ILS')return a;return a/(exchangeRates['ILS']||1)*(exchangeRates[c]||1);}
function getExpType(cat){return PRE_TRIP_CATS.includes(cat)?'pre':'on';}
function lockRates(amount,currency){
    if(!exchangeRates){const fb={ILS_Amount:0,USD_Amount:0,PHP_Amount:0,Exchange_Rate:''};if(currency==='ILS')fb.ILS_Amount=amount;else if(currency==='USD')fb.USD_Amount=amount;else if(currency==='PHP')fb.PHP_Amount=amount;return fb;}
    const u=amount/(exchangeRates[currency]||1);
    return{ILS_Amount:Math.round(u*(exchangeRates['ILS']||1)*100)/100,USD_Amount:Math.round(u*100)/100,PHP_Amount:Math.round(u*(exchangeRates['PHP']||1)*100)/100,Exchange_Rate:JSON.stringify({USD:exchangeRates['USD'],ILS:exchangeRates['ILS'],PHP:exchangeRates['PHP']})};
}
function parseExp(e,idx){
    const a=parsePriceNum(e['Amount']),c=e['Currency']||'ILS',cat=e['Category']||'',type=e['Type']||getExpType(cat);
    let ils=parsePriceNum(e['ILS_Amount']),usd=parsePriceNum(e['USD_Amount']),php=parsePriceNum(e['PHP_Amount']);
    if(!ils&&a)ils=convertToILS(a,c);if(!usd&&a)usd=convertFromILS(convertToILS(a,c),'USD');if(!php&&a)php=convertFromILS(convertToILS(a,c),'PHP');
    return{idx,desc:e['Description']||'',amount:a,currency:c,cat,type,who:e['Who']||'',date:e['Date']||'',ils,usd,php};
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function todayStr(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}

// ==================== WEATHER ====================
async function fetchWeather(){
    try{const cached=JSON.parse(localStorage.getItem(WEATHER_KEY)||'null');
    if(cached&&Date.now()-cached.ts<3600000){weatherData=cached.data;return;}}catch(e){}
    const data={};
    await Promise.allSettled(DESTS.filter((d,i,a)=>a.findIndex(x=>x.lat===d.lat&&x.lon===d.lon)===i).map(async d=>{
        try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${d.lat}&longitude=${d.lon}&current=temperature_2m,weather_code&timezone=auto`);
        const j=await r.json();if(j.current){data[`${d.lat},${d.lon}`]=j.current;}}catch(e){}
    }));
    weatherData=data;
    try{localStorage.setItem(WEATHER_KEY,JSON.stringify({data,ts:Date.now()}));}catch(e){}
}
function getWeather(dest){
    const w=weatherData[`${dest.lat},${dest.lon}`];
    if(!w)return'';
    const code=w.weather_code,temp=Math.round(w.temperature_2m);
    let icon='☀️';if(code>=1&&code<=3)icon='⛅';if(code>=45&&code<=48)icon='🌫️';if(code>=51&&code<=67)icon='🌧️';if(code>=71&&code<=77)icon='❄️';if(code>=80)icon='🌧️';if(code>=95)icon='⛈️';
    return`${icon} ${temp}°C`;
}

function renderBudgetData(){
    const all=(DB.expenses||[]).map((e,i)=>parseExp(e,i));

    const onILS=onTrip.reduce((s,e)=>s+e.ils,0),onUSD=onTrip.reduce((s,e)=>s+e.usd,0),onPHP=onTrip.reduce((s,e)=>s+e.php,0);
    let flILS=0,htILS=0;
    if(DB.flights)DB.flights.forEach(f=>{const p=parsePriceNum(f['Price']);if(p&&f['Route'])flILS+=convertToILS(p,'USD');});
    if(DB.hotels)DB.hotels.forEach(h=>{const t=parsePriceNum(h['Total Price']);if(t)htILS+=t;});
    const preILS=preTrip.reduce((s,e)=>s+e.ils,0)+flILS+htILS;

            </div>
        </div>`;
    }).join('');
}

function packCatIcon(cat){const c=PACK_CAT_MAP[cat];return c?c.icon:'📦';}
function packWhoLabel(w){return w==='Tom'?'Tom':w==='Dani'||w==='Daniella'?'Daniella':'משותף';}
function packWhoClass(w){return w==='Tom'?'tom':w==='Dani'||w==='Daniella'?'dani':'shared';}
function isCritical(r){return (r['Critical']||'').toUpperCase()==='TRUE';}

function getOrderedCatKeys(catObj){
    const saved=getPackCatOrder();
    const keys=Object.keys(catObj);
    if(!saved)return keys;
    const ordered=[];
    saved.forEach(k=>{if(keys.includes(k))ordered.push(k);});
    keys.forEach(k=>{if(!ordered.includes(k))ordered.push(k);});
    return ordered;
}

function renderPackingSection(){
    const main=document.getElementById('main');
    const data=DB.packing;
    if(!data){main.innerHTML='<div class="section-view"><div class="section-view-title">🎒 ציוד</div><div class="empty">טוען ציוד...</div></div>';return;}

    // annotate rows

    const totalI=all.length, packedI=all.filter(r=>(r['Packed']||'').toUpperCase()==='TRUE').length;

    // counts
    const tomC=all.filter(r=>r['Who']==='Tom').length;
    const daniC=all.filter(r=>r['Who']==='Dani'||r['Who']==='Daniella').length;
    const sharedC=all.filter(r=>r['Who']!=='Tom'&&r['Who']!=='Dani'&&r['Who']!=='Daniella').length;
    const critC=all.filter(r=>isCritical(r)).length;

    // filter
    let filtered=all;
    if(currentPackWho==='tom') filtered=all.filter(r=>r['Who']==='Tom');
    else if(currentPackWho==='dani') filtered=all.filter(r=>r['Who']==='Dani'||r['Who']==='Daniella');
    else if(currentPackWho==='shared') filtered=all.filter(r=>r['Who']!=='Tom'&&r['Who']!=='Dani'&&r['Who']!=='Daniella');
    else if(currentPackWho==='critical') filtered=all.filter(r=>isCritical(r));

    // group by category
    const cats={};
    PACK_CATS.forEach(c=>{const items=filtered.filter(r=>(r['Category']||'שונות')===c.id);if(items.length)cats[c.id]=items;});
    filtered.forEach(r=>{const c=r['Category']||'שונות';if(!PACK_CAT_MAP[c]){if(!cats[c])cats[c]=[];cats[c].push(r);}});

    // apply saved order
    const orderedKeys=getOrderedCatKeys(cats);

    // summary
    const allDone=totalI>0&&packedI===totalI;
    const summaryText=allDone?'הכל ארוז! 🎉':`ארזנו ${packedI} מתוך ${totalI} פריטים`;

    main.innerHTML=`<div class="section-view"><div class="section-view-title">🎒 ציוד</div>
        <div class="pack-summary ${allDone?'done':''}">${summaryText}</div>

        <div class="pack-add-form">
            <div class="pack-add-row">
                <input type="text" class="pack-add-inp" id="pack-inp" placeholder="הוסף פריט..." autocomplete="off">
                <button class="pack-add-btn" onclick="addPackItem()">הוסף</button>
            </div>
            <div class="pack-sel-label">קטגוריה</div>
            <div class="pack-sel-row">${PACK_CATS.map(c=>`<button class="pack-sel-btn ${packSelCat===c.id?'active':''}" onclick="packSelCat='${c.id}';renderPackingSection()">${c.icon} ${c.id}</button>`).join('')}</div>
            <div class="pack-sel-label">למי</div>
            <div class="pack-sel-row">
                <button class="pack-sel-btn ${packSelWho==='Tom'?'active':''}" onclick="packSelWho='Tom';renderPackingSection()">👨 Tom</button>
                <button class="pack-sel-btn ${packSelWho==='Dani'?'active':''}" onclick="packSelWho='Dani';renderPackingSection()">👩 Daniella</button>
                <button class="pack-sel-btn ${packSelWho==='Shared'?'active':''}" onclick="packSelWho='Shared';renderPackingSection()">👫 משותף</button>
                <button class="pack-crit-toggle ${packSelCrit?'active':''}" onclick="packSelCrit=!packSelCrit;renderPackingSection()">⚠️ קריטי</button>
            </div>
        </div>

        <div class="pack-tabs">
            <button class="pack-tab ${currentPackWho==='all'?'active':''}" onclick="setPackWho('all')">הכל (${totalI})</button>
            <button class="pack-tab ${currentPackWho==='tom'?'active':''}" onclick="setPackWho('tom')">👨 Tom (${tomC})</button>
            <button class="pack-tab ${currentPackWho==='dani'?'active':''}" onclick="setPackWho('dani')">👩 Daniella (${daniC})</button>
            <button class="pack-tab ${currentPackWho==='shared'?'active':''}" onclick="setPackWho('shared')">👫 משותף (${sharedC})</button>
            <button class="pack-tab ${currentPackWho==='critical'?'active':''}" onclick="setPackWho('critical')">🔴 קריטי (${critC})</button>
        </div>

        ${orderedKeys.length===0?'<div class="empty">אין פריטים בסינון הנוכחי</div>':''}
        ${orderedKeys.map((cat,ci)=>{
            const items=cats[cat];
            const cp=items.filter(r=>(r['Packed']||'').toUpperCase()==='TRUE').length;
            const icon=packCatIcon(cat);
            const isCollapsed=!!collapsedCats[cat];
            return`<div class="pack-cat-hdr ${isCollapsed?'collapsed':''}">
                <h3 onclick="togglePackCat('${esc(cat)}')">${icon} ${esc(cat)} — <span style="font-weight:400;color:var(--text-l)">${cp}/${items.length}</span></h3>
                <div class="pack-cat-reorder">
                    <button onclick="event.stopPropagation();movePackCat('${esc(cat)}',-1)" title="הזז למעלה" ${ci===0?'disabled style="opacity:.2"':''}>▲</button>
                    <button onclick="event.stopPropagation();movePackCat('${esc(cat)}',1)" title="הזז למטה" ${ci===orderedKeys.length-1?'disabled style="opacity:.2"':''}>▼</button>
                </div>
                <span class="chevron" onclick="togglePackCat('${esc(cat)}')">▼</span>
            </div>
            <div class="pack-cat-items ${isCollapsed?'collapsed':''}">${items.map(r=>{
                const done=(r['Packed']||'').toUpperCase()==='TRUE';
                const who=r['Who']||'Shared';
                const crit=isCritical(r);
                const isEditing=editPackRow===r._row;
                if(isEditing){
                    return`<div class="pack-edit-row" id="pack-edit-${r._row}">
                        <input class="pack-edit-inp" id="pe-name-${r._row}" value="${esc(r['Item'])}">
                        <select class="pack-edit-sel" id="pe-cat-${r._row}">${PACK_CATS.map(c=>`<option value="${c.id}" ${(r['Category']||'שונות')===c.id?'selected':''}>${c.icon} ${c.id}</option>`).join('')}</select>
                        <select class="pack-edit-sel" id="pe-who-${r._row}"><option value="Tom" ${who==='Tom'?'selected':''}>👨 Tom</option><option value="Dani" ${who==='Dani'||who==='Daniella'?'selected':''}>👩 Daniella</option><option value="Shared" ${who!=='Tom'&&who!=='Dani'&&who!=='Daniella'?'selected':''}>👫 משותף</option></select>
                        <button class="pack-crit-toggle ${crit?'active':''}" id="pe-crit-${r._row}" onclick="this.classList.toggle('active')">⚠️ קריטי</button>
                        <button class="pack-edit-save" onclick="savePackEdit(${r._row})">שמור</button>
                        <button class="pack-edit-cancel" onclick="editPackRow=null;renderPackingSection()">ביטול</button>
                    </div>`;
                }
                return`<div class="pack-item ${done?'done':''} ${crit?'critical':''}" id="pack-row-${r._row}">
                    <div class="pack-chk" onclick="togglePackItem(${r._row})"></div>
                    ${crit?'<span class="pack-critical-dot">🔴</span>':''}
                    <div class="pack-txt" onclick="togglePackItem(${r._row})">${esc(r['Item'])}</div>
                    <span class="pack-who-badge ${packWhoClass(who)}">${packWhoLabel(who)}</span>
                    <div class="pack-item-actions">
                        <button class="pack-act-btn" onclick="toggleCriticalItem(${r._row})" title="${crit?'הסר קריטי':'סמן קריטי'}">${crit?'🔴':'⚪'}</button>
                        <button class="pack-act-btn" onclick="startEditPack(${r._row})" title="ערוך">✏️</button>
                        <button class="pack-act-btn" onclick="deletePackItem(${r._row},'${esc(r['Item'])}')" title="מחק">🗑️</button>
                    </div>
                </div>`;
            }).join('')}</div>`;
        }).join('')}
    </div>`;
    const inp=document.getElementById('pack-inp');
    if(inp && !data.length) inp.focus();
    if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')addPackItem();});
}

function setPackWho(w){currentPackWho=w;renderPackingSection();}
function togglePackCat(cat){collapsedCats[cat]=!collapsedCats[cat];renderPackingSection();}

function movePackCat(cat,dir){
    const saved=getPackCatOrder();
    // build current order from rendered keys
    const data=DB.packing||[];
    const all=data.map((r,i)=>({...r,_row:i+2}));
    let filtered=all;
    if(currentPackWho==='tom') filtered=all.filter(r=>r['Who']==='Tom');
    else if(currentPackWho==='dani') filtered=all.filter(r=>r['Who']==='Dani'||r['Who']==='Daniella');
    else if(currentPackWho==='shared') filtered=all.filter(r=>r['Who']!=='Tom'&&r['Who']!=='Dani'&&r['Who']!=='Daniella');
    else if(currentPackWho==='critical') filtered=all.filter(r=>isCritical(r));
    const cats={};
    PACK_CATS.forEach(c=>{if(filtered.some(r=>(r['Category']||'שונות')===c.id))cats[c.id]=true;});
    filtered.forEach(r=>{const c=r['Category']||'שונות';if(!PACK_CAT_MAP[c])cats[c]=true;});
    const keys=getOrderedCatKeys(cats);
    const idx=keys.indexOf(cat);
    if(idx<0)return;
    const swapIdx=idx+dir;
    if(swapIdx<0||swapIdx>=keys.length)return;
    [keys[idx],keys[swapIdx]]=[keys[swapIdx],keys[idx]];
    savePackCatOrder(keys);
    renderPackingSection();
}

async function addPackItem(){
    const inp=document.getElementById('pack-inp');
    const name=(inp?inp.value:'').trim();
    if(!name){inp&&inp.focus();return;}
    const who=packSelWho==='Dani'?'Dani':packSelWho;
    const critVal=packSelCrit?'TRUE':'FALSE';
    if(!DB.packing)DB.packing=[];
    DB.packing.push({Item:name,Category:packSelCat,Packed:'FALSE',Who:who,Critical:critVal});
    setCooldown('packing');saveCache();
    renderPackingSection();
    showToast('פריט נוסף ✓');
    setTimeout(()=>{const items=document.querySelectorAll('.pack-item');if(items.length){items[items.length-1].classList.add('new-item');}},50);
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'addPackingItem',data:{Item:name,Category:packSelCat,Who:who,Critical:critVal}})});}catch(e){}
}

async function togglePackItem(row){
    const idx=row-2;if(DB.packing&&DB.packing[idx]){
        const cur=(DB.packing[idx]['Packed']||'').toUpperCase()==='TRUE';DB.packing[idx]['Packed']=cur?'FALSE':'TRUE';
        setCooldown('packing');renderPackingSection();saveCache();
    }
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'togglePacking',data:{row}})});}catch(e){}
}

async function toggleCriticalItem(row){
    const idx=row-2;if(DB.packing&&DB.packing[idx]){
        const cur=isCritical(DB.packing[idx]);DB.packing[idx]['Critical']=cur?'FALSE':'TRUE';
        setCooldown('packing');renderPackingSection();saveCache();
    }
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'toggleCritical',data:{row}})});}catch(e){}
}

function startEditPack(row){editPackRow=row;renderPackingSection();const inp=document.getElementById('pe-name-'+row);if(inp)inp.focus();}

async function savePackEdit(row){
    const name=(document.getElementById('pe-name-'+row)?.value||'').trim();
    const cat=document.getElementById('pe-cat-'+row)?.value||'שונות';
    const who=document.getElementById('pe-who-'+row)?.value||'Shared';
    const critEl=document.getElementById('pe-crit-'+row);
    const crit=critEl?critEl.classList.contains('active'):false;
    if(!name){showToast('יש להזין שם פריט');return;}
    const idx=row-2;
    if(DB.packing&&DB.packing[idx]){
        DB.packing[idx]['Item']=name;DB.packing[idx]['Category']=cat;DB.packing[idx]['Who']=who;
        DB.packing[idx]['Critical']=crit?'TRUE':'FALSE';
        setCooldown('packing');saveCache();
    }
    editPackRow=null;renderPackingSection();showToast('פריט עודכן ✓');
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'editPackingItem',data:{row,Item:name,Category:cat,Who:who,Critical:crit}})});}catch(e){}
}

async function deletePackItem(row,name){
    if(!confirm(`למחוק את "${name}"?`))return;
    const el=document.getElementById('pack-row-'+row);
    if(el){el.classList.add('removing');await new Promise(r=>setTimeout(r,300));}
    const idx=row-2;
    if(DB.packing&&DB.packing[idx]){
        DB.packing.splice(idx,1);
        setCooldown('packing');saveCache();
    }
    renderPackingSection();showToast('פריט נמחק');
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'deletePackingItem',data:{row}})});}catch(e){}
}

// --- CONVERTER ---
const CSYM={USD:'$',ILS:'₪',PHP:'₱'},CNAME={USD:'דולר',ILS:'שקל',PHP:'פזו'};
function renderConverterSection(){
    const main=document.getElementById('main');
    if(!exchangeRates){main.innerHTML='<div class="section-view"><div class="section-view-title">💱 המרת מטבעות</div><div class="loading"><div class="spinner"></div><div>טוען שערים...</div></div></div>';return;}
    main.innerHTML=`<div class="section-view"><div class="section-view-title">💱 המרת מטבעות</div>
        <div class="conv-card">
            <div class="conv-row"><input type="number" class="conv-inp" id="cv-amt" placeholder="סכום" inputmode="decimal"><select class="conv-sel" id="cv-from"><option value="USD">$ USD</option><option value="ILS">₪ ILS</option><option value="PHP">₱ PHP</option></select></div>
            <div class="conv-swap"><button onclick="swapConv()">⇅</button></div>
            <div class="conv-row"><div class="conv-inp" id="cv-out" style="display:flex;align-items:center;justify-content:flex-end;min-height:44px;color:var(--pri)">—</div><select class="conv-sel" id="cv-to"><option value="ILS">₪ ILS</option><option value="USD">$ USD</option><option value="PHP">₱ PHP</option></select></div>
            <div class="conv-quick" id="cv-quick"></div>
            <div class="conv-result" id="cv-res" style="display:none"><div class="conv-result-amt" id="cv-res-amt"></div><div class="conv-result-lbl" id="cv-res-lbl"></div></div>
            <div class="conv-rate" id="cv-rate"></div>
        </div>
    </div>`;
    document.getElementById('cv-amt').addEventListener('input',doConv);
    document.getElementById('cv-from').addEventListener('change',()=>{updateQuickAmt();doConv();});
    document.getElementById('cv-to').addEventListener('change',doConv);
    updateQuickAmt();
    if(ratesLastUpdated){const d=new Date(ratesLastUpdated);document.getElementById('cv-rate').textContent=`שערים עודכנו: ${d.toLocaleDateString('he-IL')} ${d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}`;}
}
function updateQuickAmt(){
    const from=document.getElementById('cv-from').value;const a=from==='USD'?[10,50,100,500]:from==='ILS'?[50,100,500,1000]:[500,1000,5000,10000];
    document.getElementById('cv-quick').innerHTML=a.map(v=>`<button class="conv-quick-btn" onclick="document.getElementById('cv-amt').value=${v};doConv()">${CSYM[from]}${v.toLocaleString()}</button>`).join('');
}
function doConv(){
    const from=document.getElementById('cv-from').value,to=document.getElementById('cv-to').value,amt=parseFloat(document.getElementById('cv-amt').value);
    const o=document.getElementById('cv-out'),r=document.getElementById('cv-res');
    if(!amt||!exchangeRates){o.textContent='—';r.style.display='none';return;}
    const res=(amt/exchangeRates[from])*exchangeRates[to];
    o.textContent=CSYM[to]+(Math.round(res*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    const rate=exchangeRates[to]/exchangeRates[from];r.style.display='block';
    document.getElementById('cv-res-amt').textContent=`${CSYM[from]}1 = ${CSYM[to]}${rate.toFixed(4)}`;
    document.getElementById('cv-res-lbl').textContent=`${CNAME[from]} ל${CNAME[to]}`;
}
function swapConv(){const f=document.getElementById('cv-from'),t=document.getElementById('cv-to'),tmp=f.value;f.value=t.value;t.value=tmp;updateQuickAmt();doConv();}

// --- EMERGENCY ---
function renderEmergencySection(){
    const main=document.getElementById('main');
    const data=DB.emergency;
    if(!data||!data.length){main.innerHTML='<div class="section-view"><div class="section-view-title">🆘 חירום</div><div class="empty">לא נמצא מידע חירום</div></div>';return;}
    main.innerHTML='<div class="section-view"><div class="section-view-title">🆘 חירום</div>'+data.map(e=>`<div class="emg-card"><div class="emg-title">${esc(e['Name'])}</div>${e['Phone']?`<a href="tel:${esc(e['Phone'])}" class="emg-phone">📞 ${esc(e['Phone'])}</a>`:''}${e['Address']?`<div class="emg-val" style="margin-top:6px">${esc(e['Address'])}</div>`:''}${e['Notes']?`<div class="emg-val" style="margin-top:4px;font-size:12px">${esc(e['Notes'])}</div>`:''}</div>`).join('')+'</div>';
}

// --- LINKS ---
function renderLinksSection(){
    const main=document.getElementById('main');
    const data=DB.links;
    if(!data||!data.length){main.innerHTML='<div class="section-view"><div class="section-view-title">🔗 קישורים</div><div class="empty">לא נמצאו קישורים</div></div>';return;}
    main.innerHTML='<div class="section-view"><div class="section-view-title">🔗 קישורים</div>'+data.map(l=>`<a href="${esc(l['URL'])}" class="link-item" target="_blank"><div class="link-icon">${esc(l['Icon'])||'🔗'}</div><div class="link-info"><div class="link-title">${esc(l['Name'])}</div>${l['Description']?`<div class="link-desc">${esc(l['Description'])}</div>`:''}</div></a>`).join('')+'</div>';
}

// ==================== NOTES MANAGEMENT ====================
let selNoteCatVal='Food';
function selNoteCat(btn){document.querySelectorAll('.note-cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selNoteCatVal=btn.dataset.cat;}
async function addNoteItem(destId){
    const title=document.getElementById('note-title').value.trim();if(!title){document.getElementById('note-title').focus();return;}
    const link=document.getElementById('note-link').value.trim(),desc=document.getElementById('note-desc').value.trim();
    const note={DestinationID:destId,Category:selNoteCatVal,Title:title,Link:link,Description:desc,Done:'FALSE',ID:Date.now().toString(36)};
    if(!DB.notes)DB.notes=[];DB.notes.push(note);setCooldown('notes');saveCache();renderSpace(destId);showToast('ההמלצה נוספה');
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'addNote',data:note})});}catch(e){}
}
async function toggleNote(row,destId){
    const idx=row-2;if(DB.notes&&DB.notes[idx]){
        const cur=(DB.notes[idx]['Done']||'').toUpperCase()==='TRUE';DB.notes[idx]['Done']=cur?'FALSE':'TRUE';
        setCooldown('notes');saveCache();renderSpace(destId);
    }
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'toggleNote',data:{row}})});}catch(e){}
}
async function deleteNoteItem(row,destId){
    if(!confirm('למחוק את ההמלצה?'))return;
    const idx=row-2;if(DB.notes)DB.notes.splice(idx,1);setCooldown('notes');saveCache();renderSpace(destId);showToast('ההמלצה נמחקה');
    try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'deleteNote',data:{row}})});}catch(e){}
}

// ==================== SYNC & REFRESH ====================
async function refreshData(showIndicator){
    const success=await fetchAllData();
    if(success){
        if(currentView==='home')renderMarketplace();
        else if(currentView==='space')renderSpace(currentSpaceId);
        else if(currentView==='section')renderSection(currentSection);
    }
    if(showIndicator)showToast('הנתונים עודכנו');
    return success;
}
setInterval(()=>refreshData(false),60000);

// ==================== EXCHANGE RATES ====================
async function fetchRates(){
    try{const r=await fetch('https://open.er-api.com/v6/latest/USD');const d=await r.json();
    if(d.result==='success'){exchangeRates=d.rates;ratesLastUpdated=d.time_last_update_utc;}}catch(e){}
}

// ==================== INIT ====================
async function init(){
    const hadCache=loadCache();
    if(hadCache)renderMarketplace();
    else document.getElementById('main').innerHTML='<div class="loading" style="padding-top:100px"><div class="spinner"></div><div style="margin-top:12px">טוען את הטיול...</div></div>';
    await Promise.all([fetchRates(),fetchWeather()]);
    const success=await fetchAllData();
    if(success||hadCache){renderApp();}
}
init();
</script>
