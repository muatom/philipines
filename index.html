<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F2F2F7">
<title>הפיליפינים 2026</title>
<style>
/* ========== DESIGN TOKENS (Apple HIG) ========== */
:root{
    --blue:#007AFF;--blue-l:#5AC8FA;--green:#34C759;--orange:#FF9500;--red:#FF3B30;
    --purple:#AF52DE;--pink:#FF2D55;--indigo:#5856D6;--teal:#30B0C7;--yellow:#FFCC00;
    --gray:#8E8E93;--gray-2:#AEAEB2;--gray-3:#C7C7CC;--gray-4:#D1D1D6;--gray-5:#E5E5EA;--gray-6:#F2F2F7;
    --bg:#F2F2F7;--card:#FFFFFF;--card-2:#F9F9FB;
    --separator:rgba(60,60,67,.18);--separator-s:rgba(60,60,67,.08);
    --text:#1C1C1E;--text-2:#3C3C43;--text-3:#8E8E93;--text-4:#C7C7CC;
    --r-s:10px;--r-m:14px;--r-l:18px;--r-xl:24px;
    --sh-1:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06);
    --sh-2:0 2px 8px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
    --sh-3:0 8px 24px rgba(0,0,0,.12);
    --sh-fab:0 6px 20px rgba(0,122,255,.4),0 2px 6px rgba(0,0,0,.12);
    --hdr:52px;--nav:64px;
    --ease:cubic-bezier(.32,.72,0,1);--ease-s:cubic-bezier(.4,0,.2,1);
}
@media(prefers-color-scheme:dark){
    :root{
        --bg:#000000;--card:#1C1C1E;--card-2:#2C2C2E;
        --separator:rgba(84,84,88,.65);--separator-s:rgba(84,84,88,.35);
        --text:#FFFFFF;--text-2:#EBEBF5;--text-3:#8E8E93;--text-4:#48484A;
        --gray-6:#1C1C1E;--gray-5:#2C2C2E;--gray-4:#3A3A3C;
    }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.4}
button,input,select,textarea{font-family:inherit;color:inherit}
input,textarea,select{font-size:17px}
a{color:var(--blue);text-decoration:none}

/* ========== HEADER ========== */
.app-hdr{position:fixed;top:0;left:0;right:0;height:calc(var(--hdr) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);display:flex;align-items:center;padding-inline:16px;z-index:50;border-bottom:.5px solid var(--separator);gap:8px}
@media(prefers-color-scheme:dark){.app-hdr{background:rgba(28,28,30,.82)}}
.hdr-btn{background:none;border:none;font-size:17px;cursor:pointer;padding:8px;color:var(--blue);display:flex;align-items:center;gap:4px;font-weight:400;min-width:44px;height:44px}
.hdr-back{display:none;font-size:22px;font-weight:600}
.hdr-title{flex:1;font-size:17px;font-weight:600;text-align:center;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
.hdr-menu{font-size:20px;color:var(--text)}
.hdr-refresh{font-size:18px;color:var(--text-2)}

/* ========== MAIN ========== */
.main{padding-top:calc(var(--hdr) + env(safe-area-inset-top));padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 20px);min-height:100vh;transition:opacity .2s var(--ease-s)}
.main.fading{opacity:0}

/* ========== BOTTOM NAV (Glass) ========== */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(255,255,255,.88);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-top:.5px solid var(--separator);display:flex;justify-content:space-around;align-items:stretch;z-index:50}
@media(prefers-color-scheme:dark){.bnav{background:rgba(28,28,30,.88)}}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;font-size:10px;color:var(--gray);cursor:pointer;transition:color .2s;padding:6px 2px;font-weight:500}
.bnav-item .bi{font-size:22px;line-height:1;transition:transform .2s var(--ease)}
.bnav-item:active .bi{transform:scale(.9)}
.bnav-item.active{color:var(--blue)}

/* ========== SIDEBAR ========== */
.sb-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.sb-ov.open{opacity:1;pointer-events:auto}
.sidebar{position:fixed;top:0;right:-300px;width:286px;height:100%;background:var(--card);z-index:100;transition:right .35s var(--ease);box-shadow:var(--sh-3);display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
.sidebar.open{right:0}
.sb-hdr{padding:24px 20px 20px;background:linear-gradient(135deg,#007AFF,#5856D6);color:#fff;position:relative}
.sb-hdr h2{font-size:22px;font-weight:700;letter-spacing:-.3px}
.sb-hdr p{font-size:13px;opacity:.85;margin-top:4px}
.sb-close{position:absolute;top:18px;left:18px;background:rgba(255,255,255,.22);backdrop-filter:blur(10px);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600}
.sb-items{flex:1;overflow-y:auto;padding:8px 0}
.sb-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:16px;font-weight:500;color:var(--text);cursor:pointer;border:none;background:none;width:100%;text-align:right;transition:background .15s;min-height:56px}
.sb-item:active{background:var(--gray-6)}
.sb-item .si{font-size:20px;width:28px;text-align:center;color:var(--blue)}

/* ========== GENERIC CARDS ========== */
.card{background:var(--card);border-radius:var(--r-l);padding:16px;box-shadow:var(--sh-1);margin-bottom:12px}
.card-group{background:var(--card);border-radius:var(--r-l);box-shadow:var(--sh-1);overflow:hidden;margin-bottom:12px}
.card-group .row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--separator-s);cursor:pointer}
.card-group .row:last-child{border-bottom:none}
.card-group .row:active{background:var(--gray-6)}

.section{padding:16px}
.section-title{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:14px;color:var(--text)}
.section-subtitle{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin:18px 16px 8px;padding-inline:4px}

/* ========== MARKETPLACE ========== */
.mk-hdr{padding:12px 20px 6px}
.mk-hdr h1{font-size:30px;font-weight:800;letter-spacing:-.8px;color:var(--text)}
.mk-hdr .sub{font-size:14px;color:var(--text-3);margin-top:2px}
.mk-countdown{margin:12px 20px 0;padding:14px 16px;background:linear-gradient(135deg,rgba(0,122,255,.08),rgba(88,86,214,.08));border-radius:var(--r-m);font-size:14px;font-weight:600;color:var(--blue);text-align:center}
.mk-hero{margin:16px 20px;border-radius:var(--r-xl);overflow:hidden;position:relative;height:260px;cursor:pointer;box-shadow:var(--sh-2);transition:transform .25s var(--ease)}
.mk-hero:active{transform:scale(.985)}
.mk-hero-img{width:100%;height:100%;object-fit:cover}
.mk-hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.15) 55%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:22px}
.mk-hero-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.22);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);color:#fff;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px;align-self:flex-start;border:.5px solid rgba(255,255,255,.3)}
.mk-hero-name{font-size:34px;font-weight:800;color:#fff;letter-spacing:-.6px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.mk-hero-info{font-size:14px;color:rgba(255,255,255,.9);margin-top:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mk-hero-info .dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.6)}
.mk-scroll-title{font-size:22px;font-weight:700;padding:20px 20px 12px;color:var(--text);letter-spacing:-.3px}
.mk-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 20px 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x mandatory}
.mk-scroll::-webkit-scrollbar{display:none}
.mk-card{flex:0 0 160px;height:200px;border-radius:var(--r-l);overflow:hidden;position:relative;cursor:pointer;box-shadow:var(--sh-1);scroll-snap-align:start;transition:transform .2s var(--ease)}
.mk-card:active{transform:scale(.97)}
.mk-card-img{width:100%;height:100%;object-fit:cover}
.mk-card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.05) 55%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.mk-card-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.2px}
.mk-card-info{font-size:11px;color:rgba(255,255,255,.85);margin-top:3px}
.mk-budget{margin:20px;background:var(--card);border-radius:var(--r-l);padding:18px;box-shadow:var(--sh-1)}
.mk-budget-title{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.mk-budget-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.mk-budget-stat{text-align:center}
.mk-budget-val{font-size:20px;font-weight:700;letter-spacing:-.3px}
.mk-budget-lbl{font-size:11px;color:var(--text-3);margin-top:3px;font-weight:500}

/* ========== DESTINATION SPACE ========== */
.sp-banner{position:relative;height:240px;overflow:hidden;margin:0 0 8px}
.sp-banner-img{width:100%;height:100%;object-fit:cover}
.sp-banner-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,rgba(0,0,0,.1) 55%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:24px}
.sp-banner-name{font-size:36px;font-weight:800;color:#fff;letter-spacing:-.7px;text-shadow:0 1px 4px rgba(0,0,0,.3)}
.sp-banner-info{font-size:14px;color:rgba(255,255,255,.92);margin-top:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ========== FLIGHT CARD ========== */
.fl-card{background:var(--card);border-radius:var(--r-l);padding:18px;margin-bottom:12px;box-shadow:var(--sh-1)}
.fl-route-info{font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:6px}
.fl-route{display:flex;align-items:center;justify-content:space-between;margin:8px 0 14px}
.fl-point{text-align:center}
.fl-code{font-size:28px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.fl-time{font-size:14px;font-weight:600;color:var(--blue);margin-top:2px}
.fl-line{flex:1;display:flex;align-items:center;justify-content:center;padding:0 14px;position:relative}
.fl-line::before{content:'';position:absolute;top:50%;left:14px;right:14px;height:2px;background:linear-gradient(to left,var(--blue),var(--gray-4));border-radius:1px}
.fl-line .plane{font-size:20px;position:relative;z-index:1;background:var(--card);padding:0 6px;transform:scaleX(-1)}
.fl-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding-top:12px;border-top:.5px solid var(--separator-s)}
.fl-detail{text-align:center}
.fl-detail-lbl{font-size:11px;color:var(--text-3);font-weight:500}
.fl-detail-val{font-size:14px;font-weight:600;margin-top:2px}
.fl-price{text-align:center;font-size:17px;font-weight:700;color:var(--blue);margin-top:6px}

/* ========== HOTEL CARD ========== */
.ht-card{background:var(--card);border-radius:var(--r-l);padding:18px;margin-bottom:12px;box-shadow:var(--sh-1)}
.ht-name{font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:10px}
.ht-dates{display:flex;gap:10px;margin:12px 0}
.ht-date{flex:1;background:var(--gray-6);border-radius:var(--r-s);padding:10px 12px;text-align:center}
.ht-date-lbl{font-size:11px;color:var(--text-3);font-weight:500}
.ht-date-val{font-size:15px;font-weight:600;margin-top:2px}
.ht-meta{font-size:13px;color:var(--text-3);margin-top:4px}
.ht-link{display:inline-flex;align-items:center;gap:5px;color:var(--blue);font-size:14px;font-weight:500;padding:10px 14px;background:rgba(0,122,255,.1);border-radius:var(--r-s);margin-top:10px;text-decoration:none}

/* ========== NOTES (Dani's Picks) ========== */
.note-card{display:flex;align-items:flex-start;gap:12px;background:var(--card);border-radius:var(--r-m);padding:14px 16px;margin-bottom:8px;box-shadow:var(--sh-1);transition:.2s}
.note-check{width:24px;height:24px;border:2px solid var(--gray-4);border-radius:50%;flex:0 0 auto;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s var(--ease);margin-top:2px}
.note-card.done .note-check{background:var(--green);border-color:var(--green);transform:scale(1.05)}
.note-card.done .note-check::after{content:'';width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}
.note-card.done .note-info{opacity:.45}
.note-card.done .note-title{text-decoration:line-through}
.note-icon{font-size:22px;flex:0 0 auto;line-height:1}
.note-info{flex:1;min-width:0}
.note-title{font-size:15px;font-weight:600}
.note-title a{color:var(--blue)}
.note-desc{font-size:13px;color:var(--text-3);margin-top:3px;line-height:1.4}
.note-del{background:none;border:none;color:var(--text-4);font-size:18px;cursor:pointer;padding:4px;line-height:1}
.note-del:active{color:var(--red)}

/* ========== BUDGET / PROGRESS ========== */
.bgt-card{background:var(--card);border-radius:var(--r-l);padding:20px;margin-bottom:14px;box-shadow:var(--sh-1)}
.bgt-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.bgt-title{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px}
.bgt-gear{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:var(--text-3)}
.bgt-amount{display:flex;align-items:baseline;gap:6px;margin-bottom:14px}
.bgt-spent{font-size:30px;font-weight:800;letter-spacing:-.8px}
.bgt-limit{font-size:15px;color:var(--text-3);font-weight:500}
.bgt-bar-thin{height:3px;background:var(--gray-5);border-radius:2px;overflow:hidden}
.bgt-fill-thin{height:100%;border-radius:2px;transition:width .6s var(--ease);background:var(--green)}
.bgt-fill-thin.g{background:var(--green)}.bgt-fill-thin.o{background:var(--orange)}.bgt-fill-thin.r{background:var(--red)}
.bgt-remaining{font-size:13px;font-weight:600;margin-top:10px;color:var(--green)}
.bgt-remaining.o{color:var(--orange)}.bgt-remaining.r{color:var(--red)}

/* ========== INSIGHTS ROW ========== */
.ins-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.ins-card{background:var(--card);border-radius:var(--r-m);padding:12px 10px;text-align:center;box-shadow:var(--sh-1)}
.ins-lbl{font-size:10px;color:var(--text-3);font-weight:600;letter-spacing:.2px;line-height:1.3}
.ins-val{font-size:15px;font-weight:700;letter-spacing:-.3px;margin-top:5px}
.ins-val.g{color:var(--green)}.ins-val.o{color:var(--orange)}.ins-val.r{color:var(--red)}
.ins-sub{font-size:11px;color:var(--text-3);margin-top:2px}
.pace-banner{border-radius:var(--r-m);padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:600;text-align:center}
.pace-banner.g{background:rgba(52,199,89,.12);color:var(--green)}
.pace-banner.o{background:rgba(255,149,0,.12);color:var(--orange)}
.pace-banner.r{background:rgba(255,59,48,.12);color:var(--red)}

/* ========== CASH WALLET ========== */
.wallet-card{background:linear-gradient(135deg,rgba(52,199,89,.08),rgba(48,176,199,.06));border:1px solid rgba(52,199,89,.18);border-radius:var(--r-l);padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh-1)}
.wallet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wallet-title{font-size:13px;font-weight:600;color:var(--text-2);letter-spacing:.2px}
.wallet-bal{font-size:28px;font-weight:800;letter-spacing:-.8px;color:var(--green)}
.wallet-bal-sub{font-size:13px;color:var(--text-3);font-weight:500;margin-top:2px;margin-bottom:14px}
.wallet-btns{display:flex;gap:8px}
.wallet-btn{flex:1;padding:11px;background:var(--card);border:1px solid var(--separator-s);border-radius:var(--r-m);font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:.2s}
.wallet-btn:active{transform:scale(.97);background:var(--gray-6)}
.wallet-btn-alt{background:rgba(0,122,255,.08);color:var(--blue);border-color:transparent}
.wallet-empty .wallet-bal,.wallet-empty .wallet-bal-sub{display:none}
.wallet-empty-msg{font-size:13px;color:var(--text-3);line-height:1.5;margin:4px 0 14px}
.cw-hint{font-size:13px;color:var(--text-3);background:var(--gray-6);padding:10px 14px;border-radius:var(--r-m);margin-bottom:12px;line-height:1.5}
.cw-big{font-size:20px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px;text-align:center}
.cw-expected{font-size:13px;color:var(--text-3);text-align:center;margin-bottom:14px}
.cw-expected b{color:var(--text);font-weight:600}
.cw-big-input{font-size:28px;font-weight:700;text-align:center;padding:14px}
.cw-note{font-size:12px;color:var(--text-3);line-height:1.5;margin:8px 0 12px;padding:10px 14px;background:rgba(255,204,0,.08);border-radius:var(--r-m)}
.spread-lbl{font-size:14px;color:var(--text-2);text-align:center;margin:14px 0 10px;font-weight:500}
.spread-row{display:flex;align-items:center;justify-content:center;gap:18px;margin:4px 0 6px}
.spread-btn{width:44px;height:44px;border-radius:50%;border:none;background:var(--gray-6);font-size:22px;font-weight:600;color:var(--text);cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;line-height:1}
.spread-btn:active{background:var(--gray-5);transform:scale(.94)}
.spread-btn:disabled{opacity:.35;cursor:not-allowed}
.spread-num{font-size:34px;font-weight:700;color:var(--text);min-width:64px;text-align:center;letter-spacing:-.5px}
.spread-range{text-align:center;color:var(--text-3);font-size:13px;margin-bottom:14px}

/* ========== CATEGORY BREAKDOWN ========== */
.cat-bd-card{background:var(--card);border-radius:var(--r-l);padding:16px;margin-bottom:14px;box-shadow:var(--sh-1)}
.cat-bd-title{font-size:12px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.cat-bd-row{display:grid;grid-template-columns:90px 1fr auto;align-items:center;gap:10px;margin-bottom:10px}
.cat-bd-row:last-child{margin-bottom:0}
.cat-bd-label{font-size:13px;color:var(--text-2);font-weight:500;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-bd-ic{font-size:14px}
.cat-bd-track{height:6px;background:var(--gray-5);border-radius:3px;overflow:hidden}
.cat-bd-fill{height:100%;border-radius:3px;transition:width .5s var(--ease)}
.cat-bd-amt{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap}
.cat-bd-pct{font-size:11px;font-weight:500;color:var(--text-3);margin-right:2px}

/* ========== TRANSACTIONS ========== */
.tx-hdr{display:flex;justify-content:space-between;align-items:center;margin:4px 0 6px;padding:0 2px}
.tx-title{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px}
.tx-list{background:var(--card);border-radius:var(--r-l);overflow:hidden;box-shadow:var(--sh-1);margin-bottom:12px}
.tx-wrap{border-bottom:.5px solid var(--separator-s)}
.tx-wrap:last-child{border-bottom:none}
.tx-card{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:var(--card);gap:10px}
.tx-card:active{background:var(--gray-6)}
.tx-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.tx-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 auto}
.tx-info{min-width:0;flex:1}
.tx-desc{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.tx-meta{font-size:11px;color:var(--text-3);margin-top:1px}
.tx-tag{font-size:9px;padding:1px 6px;border-radius:5px;font-weight:600;background:var(--gray-6);color:var(--text-3);flex-shrink:0}
.tx-tag-cw{background:rgba(48,176,199,.18);color:#30B0C7}
.tx-pay{font-size:12px;opacity:.6;margin-left:2px}
.tx-cw{opacity:.75}
.tx-cw .tx-desc{font-style:italic}
.tx-cw .tx-amt{color:var(--text-2);font-weight:600}
.tx-right{text-align:left;flex:0 0 auto}
.tx-amt{font-size:15px;font-weight:700;letter-spacing:-.2px;white-space:nowrap}
.tx-ils{font-size:11px;color:var(--text-3);margin-top:1px;white-space:nowrap}
.tx-det{display:none;background:var(--card-2);padding:0 14px;border-top:.5px solid var(--separator-s)}
.tx-det.open{display:block;padding:10px 14px}
.tx-det-row{display:flex;gap:8px}
.tx-edit,.tx-del{flex:1;padding:9px;border:none;border-radius:var(--r-s);font-size:13px;cursor:pointer;font-weight:500}
.tx-edit{background:rgba(0,122,255,.1);color:var(--blue)}
.tx-del{background:rgba(255,59,48,.1);color:var(--red)}
.show-all-btn{width:100%;padding:12px;background:none;border:none;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.show-all-btn:active{opacity:.7}


/* ========== FORM COMPONENTS ========== */
.form-label{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.3px;margin:14px 0 8px}
.input{width:100%;padding:14px 16px;background:var(--gray-6);border:none;border-radius:var(--r-m);font-size:17px;outline:none;direction:rtl;transition:box-shadow .2s;color:var(--text)}
.input:focus{box-shadow:0 0 0 3px rgba(0,122,255,.22)}
.input-row{display:flex;gap:10px;margin-bottom:10px}
.input.amt{font-size:22px;font-weight:700;text-align:center;flex:1;direction:ltr}
.input.cur{flex:0 0 100px;font-weight:600;text-align:center;font-size:15px}
.input.dt{direction:ltr;text-align:left;font-size:15px}
.conv-hint{font-size:12px;color:var(--text-3);text-align:center;padding:4px 0 2px;min-height:18px;font-weight:500}

.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.cat-btn{padding:12px 6px;border:none;border-radius:var(--r-m);background:var(--gray-6);font-size:11px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;transition:.15s;color:var(--text-2);font-weight:500}
.cat-btn.active{background:var(--blue);color:#fff;font-weight:600}
.cat-btn .cat-ic{font-size:22px;line-height:1}

.seg{display:flex;gap:6px;background:var(--gray-6);border-radius:var(--r-m);padding:4px}
.seg-btn{flex:1;padding:10px;border:none;border-radius:10px;background:none;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-2);transition:.2s}
.seg-btn.active{background:var(--card);color:var(--text);font-weight:600;box-shadow:var(--sh-1)}
.form-label-sub{font-size:11px;color:var(--text-3);font-weight:500;margin-right:4px}
.pay-row{display:flex;gap:8px;margin-bottom:14px}
.pay-btn{flex:1;padding:12px;border:1.5px solid var(--gray-5);border-radius:var(--r-m);background:var(--card);font-size:14px;font-weight:500;cursor:pointer;color:var(--text-2);transition:.2s}
.pay-btn.active{border-color:var(--blue);background:rgba(0,122,255,.08);color:var(--blue);font-weight:600}

.btn-primary{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-m);font-size:16px;font-weight:600;cursor:pointer;transition:.2s;min-height:50px;margin-top:16px}
.btn-primary:active{transform:scale(.98);opacity:.9}
.btn-secondary{width:100%;padding:13px;background:var(--gray-6);color:var(--blue);border:none;border-radius:var(--r-m);font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;min-height:46px}
.btn-destructive{width:100%;padding:13px;background:rgba(255,59,48,.1);color:var(--red);border:none;border-radius:var(--r-m);font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;min-height:46px}

/* ========== BOTTOM SHEET ========== */
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;opacity:0;pointer-events:none;transition:opacity .35s var(--ease);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sheet-ov.open{opacity:1;pointer-events:auto}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--r-xl) var(--r-xl) 0 0;z-index:200;transform:translateY(100%);transition:transform .4s var(--ease);max-height:92vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -10px 40px rgba(0,0,0,.15)}
.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:5px;background:var(--gray-4);border-radius:3px;margin:10px auto 4px;cursor:grab;touch-action:none}
.sheet-handle:active{cursor:grabbing;background:var(--gray-3)}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 14px;border-bottom:.5px solid var(--separator-s);touch-action:none}
.sheet-title{font-size:17px;font-weight:700;letter-spacing:-.2px;flex:1;text-align:center;padding:0 40px}
.sheet-close{background:var(--gray-6);border:none;width:30px;height:30px;border-radius:50%;font-size:13px;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;position:absolute;left:16px;top:22px}
.sheet-body{flex:1;overflow-y:auto;padding:18px 20px 28px;-webkit-overflow-scrolling:touch}

/* ========== FAB ========== */
.fab{position:fixed;bottom:calc(var(--nav) + env(safe-area-inset-bottom) + 20px);left:20px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:30px;cursor:pointer;box-shadow:var(--sh-fab);display:flex;align-items:center;justify-content:center;z-index:40;transition:transform .25s var(--ease);font-weight:300;line-height:1}
.fab:active{transform:scale(.9)}

/* ========== EXPENSE CARD ========== */
.exp-list{background:var(--card);border-radius:var(--r-l);box-shadow:var(--sh-1);overflow:hidden;margin-bottom:12px}
.exp-card{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--separator-s);cursor:pointer;background:var(--card)}
.exp-card:last-child{border-bottom:none}
.exp-card:active{background:var(--gray-6)}
.exp-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto}
.exp-info{flex:1;min-width:0}
.exp-desc{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.exp-meta{font-size:12px;color:var(--text-3);margin-top:2px;display:flex;gap:6px;align-items:center}
.exp-tag{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600;background:var(--gray-6);color:var(--text-3)}
.exp-amount{text-align:left}
.exp-primary{font-size:15px;font-weight:700;white-space:nowrap;letter-spacing:-.2px}
.exp-secondary{font-size:11px;color:var(--text-3);white-space:nowrap;margin-top:1px}

/* ========== FILTER PILLS ========== */
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-top:4px}
.filters::-webkit-scrollbar{display:none}
.fil-btn{flex:0 0 auto;padding:8px 14px;border-radius:20px;border:none;background:var(--gray-6);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;transition:.2s;white-space:nowrap}
.fil-btn.active{background:var(--blue);color:#fff;font-weight:600}

/* ========== TASKS ========== */
.task-prog{background:var(--card);border-radius:var(--r-l);padding:18px;margin-bottom:12px;box-shadow:var(--sh-1)}
.task-prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.task-prog-label{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px}
.task-prog-count{font-size:15px;font-weight:700;color:var(--text)}
.task-bar{height:6px;background:var(--gray-5);border-radius:3px;overflow:hidden}
.task-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width .5s var(--ease)}

.task-list{background:var(--card);border-radius:var(--r-l);box-shadow:var(--sh-1);overflow:hidden;margin-bottom:12px}
.task-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:.5px solid var(--separator-s);background:var(--card)}
.task-item:last-child{border-bottom:none}
.task-item.done{opacity:.55}
.task-item.done .task-text{text-decoration:line-through;color:var(--text-3)}
.task-chk{width:24px;height:24px;border:2px solid var(--gray-4);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:.25s var(--ease);background:var(--card)}
.task-item.done .task-chk{background:var(--green);border-color:var(--green);transform:scale(1.05)}
.task-chk::after{content:'';display:none;width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}
.task-item.done .task-chk::after{display:block}
.task-text{flex:1;font-size:15px;color:var(--text)}
.task-due{font-size:12px;color:var(--text-3);font-weight:500}
.task-due.over{color:var(--red)}
.task-del{background:none;border:none;color:var(--text-4);font-size:18px;cursor:pointer;padding:4px;line-height:1}

/* ========== PACKING ========== */
.pack-summary{background:var(--card);border-radius:var(--r-l);padding:14px 18px;margin-bottom:12px;box-shadow:var(--sh-1);display:flex;align-items:center;justify-content:space-between}
.pack-summary-txt{font-size:15px;font-weight:600;color:var(--text)}
.pack-summary-count{font-size:13px;color:var(--text-3);font-weight:500}
.pack-summary.done .pack-summary-txt{color:var(--green)}

.pack-tabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pack-tabs::-webkit-scrollbar{display:none}
.pack-tab{flex:0 0 auto;padding:8px 14px;border-radius:20px;border:none;background:var(--gray-6);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;white-space:nowrap;transition:.2s}
.pack-tab.active{background:var(--blue);color:#fff;font-weight:600}

.pack-cat-hdr{display:flex;align-items:center;padding:12px 16px 8px;margin-top:6px}
.pack-cat-title{flex:1;font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;cursor:pointer;display:flex;align-items:center;gap:6px}
.pack-cat-reorder{display:flex;gap:4px}
.pack-cat-reorder button{background:none;border:none;font-size:13px;color:var(--text-4);cursor:pointer;padding:4px 6px;line-height:1}
.pack-cat-reorder button:active{color:var(--blue)}
.pack-cat-chev{font-size:12px;color:var(--text-3);margin-right:8px;transition:transform .2s;cursor:pointer}
.pack-cat-hdr.collapsed .pack-cat-chev{transform:rotate(-90deg)}

.pack-list{background:var(--card);border-radius:var(--r-l);box-shadow:var(--sh-1);overflow:hidden;margin-bottom:4px;transition:max-height .25s var(--ease)}
.pack-list.collapsed{max-height:0!important;margin-bottom:0}
.pack-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--separator-s);background:var(--card);transition:opacity .25s}
.pack-item:last-child{border-bottom:none}
.pack-item.done{opacity:.55}
.pack-item.done .pack-txt{text-decoration:line-through;color:var(--text-3)}
.pack-item.removing{opacity:0;transform:translateX(-40px);transition:all .3s}
.pack-item.new-item{animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.pack-chk{width:24px;height:24px;border:2px solid var(--gray-4);border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.25s var(--ease);cursor:pointer}
.pack-item.done .pack-chk{background:var(--green);border-color:var(--green);transform:scale(1.05)}
.pack-item.done .pack-chk::after{content:'';width:6px;height:11px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg);margin-top:-2px}
.pack-crit-dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex:0 0 auto}
.pack-txt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:15px;cursor:pointer}
.pack-who{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;flex:0 0 auto}
.pack-who.tom{background:rgba(0,122,255,.12);color:var(--blue)}
.pack-who.dani{background:rgba(255,45,85,.12);color:var(--pink)}
.pack-who.shared{background:rgba(175,82,222,.12);color:var(--purple)}
.pack-actions{display:flex;gap:2px;flex:0 0 auto}
.pack-actions button{background:none;border:none;font-size:15px;padding:6px;border-radius:6px;cursor:pointer;line-height:1;color:var(--text-3)}
.pack-actions button:active{background:var(--gray-6)}

/* ========== LINKS ========== */
.link-cat-hdr{font-size:13px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;padding:14px 16px 6px;display:flex;align-items:center;gap:6px;margin-top:6px}
.link-list{background:var(--card);border-radius:var(--r-l);box-shadow:var(--sh-1);overflow:hidden;margin-bottom:4px}
.link-card{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:.5px solid var(--separator-s);cursor:pointer;background:var(--card)}
.link-card:last-child{border-bottom:none}
.link-card:active{background:var(--gray-6)}
.link-card.removing{opacity:0;transform:translateX(-40px);transition:all .3s}
.link-card.new-item{animation:slideIn .3s ease}
.link-icon{width:44px;height:44px;background:var(--gray-6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
.link-info{flex:1;min-width:0}
.link-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.link-name .ext{font-size:11px;color:var(--text-4)}
.link-desc{font-size:12px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-actions{display:flex;gap:2px;flex:0 0 auto}
.link-actions button{background:none;border:none;font-size:15px;padding:6px;cursor:pointer;color:var(--text-3);line-height:1}
.link-actions button:active{background:var(--gray-6);border-radius:6px}

/* ========== CONVERTER ========== */
.conv-card{background:var(--card);border-radius:var(--r-l);padding:22px;box-shadow:var(--sh-1);margin-bottom:12px}
.conv-display{text-align:center;margin-bottom:20px}
.conv-amount{font-size:48px;font-weight:800;letter-spacing:-1.5px;direction:ltr;color:var(--text)}
.conv-label{font-size:13px;color:var(--text-3);margin-top:4px;font-weight:500}
.conv-from,.conv-to{display:flex;align-items:center;gap:10px;background:var(--gray-6);border-radius:var(--r-m);padding:14px 16px;margin-bottom:10px}
.conv-inp{flex:1;background:none;border:none;font-size:24px;font-weight:700;outline:none;direction:ltr;text-align:left;color:var(--text)}
.conv-sel{background:none;border:none;font-size:16px;font-weight:600;outline:none;color:var(--blue);cursor:pointer;min-width:80px;text-align:left}
.conv-swap{display:flex;justify-content:center;margin:-4px 0 -4px}
.conv-swap button{background:var(--blue);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;box-shadow:var(--sh-1);display:flex;align-items:center;justify-content:center}
.conv-swap button:active{transform:rotate(180deg);transition:transform .3s}
.conv-quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.conv-quick-btn{flex:1;min-width:70px;padding:10px;border:none;border-radius:var(--r-s);background:var(--gray-6);font-size:13px;font-weight:600;cursor:pointer;color:var(--text-2)}
.conv-quick-btn:active{background:var(--gray-5)}
.conv-rate{font-size:12px;color:var(--text-3);text-align:center;margin-top:14px;font-weight:500}

/* ========== EMERGENCY ========== */
.emg-card{background:var(--card);border-radius:var(--r-l);padding:18px;margin-bottom:10px;box-shadow:var(--sh-1);border-right:3px solid var(--red)}
.emg-title{font-size:16px;font-weight:700;margin-bottom:4px}
.emg-phone{display:inline-flex;align-items:center;gap:6px;color:var(--blue);font-weight:600;font-size:16px;padding:8px 14px;background:rgba(0,122,255,.1);border-radius:var(--r-s);margin-top:6px}
.emg-info{font-size:13px;color:var(--text-3);line-height:1.4;margin-top:6px}

/* ========== TOAST ========== */
.toast{position:fixed;top:calc(var(--hdr) + env(safe-area-inset-top) + 12px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);color:var(--text);padding:12px 20px;border-radius:var(--r-m);font-size:14px;font-weight:500;z-index:300;opacity:0;transition:.35s var(--ease);pointer-events:none;box-shadow:var(--sh-3);display:flex;align-items:center;gap:8px;max-width:90%;border:.5px solid var(--separator)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-ic{font-size:16px}

/* ========== MODAL (simple) ========== */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal{background:var(--card);border-radius:var(--r-xl);padding:24px;max-width:320px;width:100%;box-shadow:var(--sh-3)}
.modal h3{font-size:18px;font-weight:700;margin-bottom:6px;text-align:center}
.modal p{font-size:13px;color:var(--text-3);text-align:center;margin-bottom:16px}
.modal input{width:100%;padding:14px;background:var(--gray-6);border:none;border-radius:var(--r-m);font-size:20px;font-weight:600;text-align:center;outline:none;direction:ltr;margin-bottom:16px}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:13px;border:none;border-radius:var(--r-m);font-size:15px;font-weight:600;cursor:pointer}
.modal-save{background:var(--blue);color:#fff}
.modal-cancel{background:var(--gray-6);color:var(--blue)}

/* ========== MISC ========== */
.empty{text-align:center;padding:48px 24px;color:var(--text-3);font-size:14px;line-height:1.6}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.5;display:block}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--gray-5);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:80px 20px;color:var(--text-3)}
.loading div{margin-top:12px;font-size:14px}

/* ========== CELEBRATION ========== */
.celebrate{text-align:center;padding:24px 20px;background:linear-gradient(135deg,rgba(52,199,89,.1),rgba(0,122,255,.08));border-radius:var(--r-l);margin:12px 0;animation:celebrate .6s var(--ease)}
.celebrate-emoji{font-size:48px;animation:bounce 1s ease-in-out infinite alternate;display:inline-block}
.celebrate-txt{font-size:15px;font-weight:600;color:var(--green);margin-top:8px}
@keyframes celebrate{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes bounce{from{transform:translateY(0) rotate(-6deg)}to{transform:translateY(-6px) rotate(6deg)}}

/* ========== TAP FEEDBACK ========== */
.cat-btn:active,.seg-btn:active,.fil-btn:active,.pack-tab:active,.sb-item:active{transform:scale(.96);transition:transform .1s ease}
.mk-card:active,.exp-card:active,.task-item:active,.pack-item:active,.link-card:active,.fl-card:active,.ht-card:active,.note-card:active,.emg-card:active,.card:active{transform:scale(.99);transition:transform .1s ease}
.btn-primary,.btn-secondary,.btn-destructive{transition:transform .15s var(--ease),opacity .15s,background .2s}
.fab:hover{transform:scale(1.05)}

/* ========== SMOOTH SCROLL ========== */
html{scroll-behavior:smooth}

/* ========== GRADIENT CARD ACCENTS ========== */
.bgt-card{background:linear-gradient(135deg,var(--card) 0%,var(--card-2) 100%)}
.task-prog{background:linear-gradient(135deg,var(--card) 0%,var(--card-2) 100%)}
.pack-summary{background:linear-gradient(135deg,var(--card) 0%,var(--card-2) 100%)}

/* ========== PULL REFRESH HINT (subtle) ========== */
.refreshing{animation:spinSlow 1s linear infinite}
@keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ========== ACTIVITY MARKETPLACE ========== */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.act-cat-card{aspect-ratio:1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--sh-2);transition:transform .2s var(--ease);color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.act-cat-card:active{transform:scale(.95)}
.act-cat-card.skeleton{background:linear-gradient(110deg,var(--gray-6) 8%,var(--gray-5) 18%,var(--gray-6) 33%);background-size:200% 100%;animation:skel 1.4s linear infinite;box-shadow:none;cursor:default}
.act-cat-card.skeleton:active{transform:none}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.act-error{background:var(--card);border-radius:16px;padding:24px 20px;margin:0 16px;text-align:center;box-shadow:var(--sh-1)}
.act-error-ic{font-size:32px;margin-bottom:8px}
.act-error-msg{font-size:14px;color:var(--text-2);margin-bottom:14px;font-weight:500}
.act-error-btn{background:var(--blue);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.act-error-btn:active{transform:scale(.96)}
.act-cat-icon{font-size:40px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.act-cat-name{font-size:15px;font-weight:700;letter-spacing:-.2px}
.act-cat-count{font-size:11px;opacity:.85;font-weight:500}

/* Activity List View */
.act-list-hdr{padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.act-list-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.act-list-count{font-size:13px;color:var(--text-3);font-weight:500}
.act-filters{display:flex;gap:8px;padding:4px 20px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.act-filters::-webkit-scrollbar{display:none}
.act-fil{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;background:var(--gray-6);color:var(--text-2);transition:all .2s}
.act-fil.active{background:var(--blue);color:#fff}
.act-card{background:var(--card);border-radius:16px;padding:16px;margin:0 20px 12px;box-shadow:var(--sh-1);position:relative;cursor:pointer;transition:transform .2s var(--ease)}
.act-card:active{transform:scale(.98)}
.act-card-name{font-size:17px;font-weight:700;letter-spacing:-.2px;padding-left:36px}
.act-card-desc{font-size:13px;color:var(--text-3);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.act-card-meta{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;align-items:center}
.act-chip{font-size:12px;color:var(--text-2);font-weight:500;display:flex;align-items:center;gap:3px}
.act-hearts{color:var(--red);font-size:11px;letter-spacing:-1px}
.act-save{position:absolute;top:14px;left:14px;background:none;border:none;font-size:22px;cursor:pointer;padding:4px;transition:transform .2s var(--ease);z-index:2;filter:grayscale(1) opacity(.4)}
.act-save.saved{filter:none;animation:heartPop .4s var(--ease)}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}

/* Activity Detail Sheet */
.act-detail{padding:4px 0 20px}
.act-detail-name{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.act-detail-pill{display:inline-flex;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;margin-bottom:14px}

.act-detail-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.act-detail-chip{background:var(--gray-6);padding:8px 12px;border-radius:var(--r-s);font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px}

function getNights(d) { return Math.round((new Date(d.end) - new Date(d.start)) / 86400000); }
function fmtDestDates(d) {
    const s = new Date(d.start), e = new Date(d.end);

function getCurrentDest() {
    const now = new Date();
    for (const d of DESTS) { if (now >= new Date(d.start) && now < new Date(d.end)) return d; }
    if (now < new Date(DESTS[0].start)) return DESTS[0];
    return DESTS[DESTS.length - 1];
}
function getDestForDate(dateStr) {
    const p = dateStr.split('/');
    if (p.length < 2) return null;
    const day = parseInt(p[0]), month = parseInt(p[1]), year = p[2] ? parseInt(p[2]) : 2026;
    const d = new Date(year, month - 1, day);
    for (const dest of DESTS) { if (d >= new Date(dest.start) && d < new Date(dest.end)) return dest.id; }
    return null;
}
function getFlightsForDest(destId) {
    if (!DB.flights) return [];
    const dest = DEST_MAP[destId]; if (!dest) return [];
    const start = new Date(dest.start), end = new Date(dest.end);
    const dayBefore = new Date(start); dayBefore.setDate(dayBefore.getDate() - 1);
    return DB.flights.filter(f => {
        const dd = f['Departure Date'];
        if (!dd) return false;
        const p = dd.split('/');
        const fd = new Date(2026, parseInt(p[1])-1, parseInt(p[0]));
        return fd >= dayBefore && fd <= end;
    });
}
function getHotelsForDest(destId) {
    if (!DB.hotels) return [];
    const dest = DEST_MAP[destId]; if (!dest) return [];
    const start = new Date(dest.start), end = new Date(dest.end);
    return DB.hotels.filter(h => {
        const ci = h['Check-in'];
        if (!ci) return false;
        const p = ci.split('/');
        const hd = new Date(2026, parseInt(p[1])-1, parseInt(p[0]));
        return hd >= start && hd < end;
    });
}
function getExpensesForDest(destId) {
    if (!DB.expenses) return [];
    return DB.expenses.filter((e, i) => {
        const d = e['Date'] || '';
        return getDestForDate(d) === destId;
    }).map((e, i) => ({ ...e, _origIdx: DB.expenses.indexOf(e) }));
}
function getNotesForDest(destId) {
    if (!DB.notes) return [];

// ==================== CSV PARSER ====================
function parseCSV(text) {
    const rows = []; let current = '', inQ = false; const chars = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n'); let row = [];
    for (let i = 0; i < chars.length; i++) {
        const c = chars[i];
        if (inQ) { if (c==='"'&&chars[i+1]==='"'){current+='"';i++;}else if(c==='"'){inQ=false;}else{current+=c;} }
        else { if(c==='"'){inQ=true;}else if(c===','){row.push(current.trim());current='';}else if(c==='\n'){row.push(current.trim());if(row.some(v=>v))rows.push(row);row=[];current='';}else{current+=c;} }
    }
    if(current||row.length){row.push(current.trim());if(row.some(v=>v))rows.push(row);}
    if(rows.length<2)return[];
    const headers=rows[0];
    return rows.slice(1).map(r=>{const obj={};headers.forEach((h,i)=>{obj[h]=r[i]||'';});return obj;});
}

// ==================== DATA FETCHING ====================
function tabURL(tab){return `${SHEET_BASE}?gid=${TABS[tab].gid}&single=true&output=csv&_=${Date.now()}`;}
async function fetchTab(name){const r=await fetch(tabURL(name));if(!r.ok)throw new Error(r.status);return parseCSV(await r.text());}
function loadCache(){try{const r=localStorage.getItem(CACHE_KEY);if(r){const c=JSON.parse(r);Object.assign(DB,c.data);dataFetchedAt=c.ts;return true;}}catch(e){}return false;}
function saveCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:DB,ts:Date.now()}));}catch(e){}}
async function fetchAllData(){
    const names=Object.keys(TABS).filter(n=>TABS[n].gid!=='0');
    const fetchNames=names.filter(n=>!isInCooldown(n));
    if(!fetchNames.length)return false;
    const results=await Promise.allSettled(fetchNames.map(n=>fetchTab(n)));
    let ok=false;
    results.forEach((r,i)=>{if(r.status==='fulfilled'){DB[fetchNames[i]]=r.value;ok=true;}});
    if(ok){dataFetchedAt=Date.now();saveCache();}
    return ok;
}

function parseActivitiesCSV(text){
    const rows=[];let current='',inQ=false;const chars=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');let row=[];
    for(let i=0;i<chars.length;i++){
        const c=chars[i];
        if(inQ){if(c==='"'&&chars[i+1]==='"'){current+='"';i++;}else if(c==='"'){inQ=false;}else{current+=c;}}
        else{if(c==='"'){inQ=true;}else if(c===','){row.push(current.trim());current='';}else if(c==='\n'){row.push(current.trim());if(row.some(v=>v))rows.push(row);row=[];current='';}else{current+=c;}}
    }
    if(current||row.length){row.push(current.trim());if(row.some(v=>v))rows.push(row);}

// ==================== HELPERS ====================
function esc(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
function formatDate(s){if(!s)return'';const p=s.split('/');return p.length>=2?p[0]+'/'+p[1]:s;}
function extractCode(p){const m=p.match(/\(([A-Z]{3})\)/);return m?m[1]:p.substring(0,3).toUpperCase();}
function parsePriceNum(s){return parseFloat(String(s||'').replace(/[^0-9.\-]/g,''))||0;}
function fmtMoney(n,c){const s={ILS:'₪',USD:'$',PHP:'₱'}[c]||'₪';return s+Math.round(n).toLocaleString();}
function convertToILS(a,c){if(!exchangeRates||c==='ILS')return a;return(a/(exchangeRates[c]||1))*(exchangeRates['ILS']||1);}
function convertFromILS(a,c){if(!exchangeRates||c==='ILS')return a;return a/(exchangeRates['ILS']||1)*(exchangeRates[c]||1);}
function getExpType(cat){return PRE_TRIP_CATS.includes(cat)?'pre':'on';}
function lockRates(amount,currency){
    if(!exchangeRates){const fb={ILS_Amount:0,USD_Amount:0,PHP_Amount:0,Exchange_Rate:''};if(currency==='ILS')fb.ILS_Amount=amount;else if(currency==='USD')fb.USD_Amount=amount;else if(currency==='PHP')fb.PHP_Amount=amount;return fb;}
    const u=amount/(exchangeRates[currency]||1);
    return{ILS_Amount:Math.round(u*(exchangeRates['ILS']||1)*100)/100,USD_Amount:Math.round(u*100)/100,PHP_Amount:Math.round(u*(exchangeRates['PHP']||1)*100)/100,Exchange_Rate:JSON.stringify({USD:exchangeRates['USD'],ILS:exchangeRates['ILS'],PHP:exchangeRates['PHP']})};
}
function parseExp(e,idx){
    const a=parsePriceNum(e['Amount']),c=e['Currency']||'ILS',cat=e['Category']||'',type=e['Type']||getExpType(cat);
    let ils=parsePriceNum(e['ILS_Amount']),usd=parsePriceNum(e['USD_Amount']),php=parsePriceNum(e['PHP_Amount']);
    if(!ils&&a)ils=convertToILS(a,c);if(!usd&&a)usd=convertFromILS(convertToILS(a,c),'USD');if(!php&&a)php=convertFromILS(convertToILS(a,c),'PHP');
    const pay=(e['PaymentMethod']||'').toLowerCase();
    return{idx,desc:e['Description']||'',amount:a,currency:c,cat,type,who:e['Who']||'',date:e['Date']||'',ils,usd,php,pay};
}
function showToast(m,icon='✓'){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=m;document.getElementById('toast-ic').textContent=icon;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function todayStr(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
// Normalize DD/MM/YYYY to zero-padded form for reliable equality ("4/4/2026" -> "04/04/2026")
function normDateStr(s){if(!s)return'';const p=String(s).split('/');if(p.length!==3)return s;return`${p[0].padStart(2,'0')}/${p[1].padStart(2,'0')}/${p[2]}`;}
function isToday(dateStr){return normDateStr(dateStr)===todayStr();}
// Parse DD/MM/YYYY to Date object for comparisons
function parseDateDMY(s){if(!s)return null;const p=String(s).split('/');if(p.length!==3)return null;return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));}

// ==================== SWIPE-TO-DISMISS ====================
(function initSheetSwipe(){
    let startY=0,startT=0,curY=0,dragging=false,fromHandle=false;
    const sh=()=>document.getElementById('bottom-sheet');
    const body=()=>document.getElementById('sheet-body');
    function onStart(e){
        const t=e.touches?e.touches[0]:e;
        const sheet=sh();if(!sheet||!sheet.classList.contains('open'))return;
        // Only start drag if body is scrolled to top OR grip handle area is touched
        const b=body();
        fromHandle=!!e.target.closest('.sheet-handle')||!!e.target.closest('.sheet-hdr');
        if(!fromHandle&&b&&b.scrollTop>0)return;
        startY=t.clientY;curY=0;startT=Date.now();dragging=true;
        sheet.style.transition='none';
    }
    function onMove(e){
        if(!dragging)return;
        const t=e.touches?e.touches[0]:e;
        const dy=t.clientY-startY;
        if(dy<0){curY=0;sh().style.transform='';return;}
        // If scrolling inside content and not from handle, bail
        const b=body();
        if(!fromHandle&&b&&b.scrollTop>0){dragging=false;sh().style.transition='';sh().style.transform='';return;}
        curY=dy;
        sh().style.transform=`translateY(${dy}px)`;
        if(e.cancelable)e.preventDefault();
    }
    function onEnd(){
        if(!dragging)return;
        const elapsed=Date.now()-startT;
        const vel=curY/Math.max(elapsed,1);
        const sheet=sh();
        sheet.style.transition='transform .3s var(--ease)';
        if(curY>100||vel>0.6){
            sheet.style.transform='translateY(100%)';
            setTimeout(()=>closeSheet(),280);
        } else {
            sheet.style.transform='';
        }
        dragging=false;curY=0;
    }
    document.addEventListener('DOMContentLoaded',()=>{
        const sheet=document.getElementById('bottom-sheet');
        if(!sheet)return;
        sheet.addEventListener('touchstart',onStart,{passive:true});
        sheet.addEventListener('touchmove',onMove,{passive:false});
        sheet.addEventListener('touchend',onEnd);
        sheet.addEventListener('touchcancel',onEnd);
        // Also support mouse for desktop testing
        sheet.addEventListener('mousedown',e=>{if(e.target.closest('.sheet-handle')||e.target.closest('.sheet-hdr')){onStart(e);const mm=ev=>onMove(ev);const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);}});
    });
    // If document already loaded (fallback)
    if(document.readyState!=='loading'){
        setTimeout(()=>{
            const sheet=document.getElementById('bottom-sheet');
            if(!sheet)return;
            sheet.addEventListener('touchstart',onStart,{passive:true});
            sheet.addEventListener('touchmove',onMove,{passive:false});
            sheet.addEventListener('touchend',onEnd);
            sheet.addEventListener('touchcancel',onEnd);
            sheet.addEventListener('mousedown',e=>{if(e.target.closest('.sheet-handle')||e.target.closest('.sheet-hdr')){onStart(e);const mm=ev=>onMove(ev);const mu=()=>{onEnd();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);}});
        },0);
    }
})();

// ==================== WEATHER ====================
async function fetchWeather(){
    try{const cached=JSON.parse(localStorage.getItem(WEATHER_KEY)||'null');
    if(cached&&Date.now()-cached.ts<3600000){weatherData=cached.data;return;}}catch(e){}
    const data={};
    await Promise.allSettled(DESTS.filter((d,i,a)=>a.findIndex(x=>x.lat===d.lat&&x.lon===d.lon)===i).map(async d=>{
        try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${d.lat}&longitude=${d.lon}&current=temperature_2m,weather_code&timezone=auto`);
        const j=await r.json();if(j.current){data[`${d.lat},${d.lon}`]=j.current;}}catch(e){}
    }));
    weatherData=data;
    try{localStorage.setItem(WEATHER_KEY,JSON.stringify({data,ts:Date.now()}));}catch(e){}
}
function getWeather(dest){
    const w=weatherData[`${dest.lat},${dest.lon}`];
    if(!w)return'';
    const code=w.weather_code,temp=Math.round(w.temperature_2m);
    let icon='☀️';if(code>=1&&code<=3)icon='⛅';if(code>=45&&code<=48)icon='🌫️';if(code>=51&&code<=67)icon='🌧️';if(code>=71&&code<=77)icon='❄️';if(code>=80)icon='🌧️';if(code>=95)icon='⛈️';
    return`${icon} ${temp}°`;
}

function computeCashBalance(all){
    // SINGLE SOURCE OF TRUTH: Sheet data only.
    // The wallet tracks physical PHP cash. PH ATMs only dispense PHP, and a non-PHP
    // cash expense (e.g. paying $20 USD in cash) comes from a separate physical
    // wallet — it must not deplete the PHP balance. So we filter both sides to
    // Currency='PHP'. Off-currency cash spending is still recorded for the budget
    // total; it's just not part of this wallet's accounting.
    const withdrawals=all.filter(e=>e.type==='cash_withdrawal'&&e.currency==='PHP');
    const cashExp=all.filter(e=>e.type==='on'&&e.pay==='cash'&&e.currency==='PHP');
    const phpIn=withdrawals.reduce((s,e)=>s+e.php,0);
    const phpOut=cashExp.reduce((s,e)=>s+e.php,0);
    const balancePHP=phpIn-phpOut;
    const balanceILS=convertToILS(balancePHP,'PHP');
    return{balancePHP,balanceILS,withdrawalCount:withdrawals.length,cashExpCount:cashExp.length};
}
function computeTripPace(onTrip){
    // dailyBudget = BUDGET_LIMIT / total trip days; dailyAverage = on-trip spent / days elapsed
    const firstStart=new Date(DESTS[0].start),lastEnd=new Date(DESTS[DESTS.length-1].end);
    const totalDays=Math.max(1,Math.round((lastEnd-firstStart)/86400000));
    const dailyBudget=BUDGET_LIMIT/totalDays;
    const now=new Date();
    let daysElapsed=0;
    if(now>=firstStart){
        const cap=now<lastEnd?now:lastEnd;
        daysElapsed=Math.max(1,Math.ceil((cap-firstStart)/86400000));
    }
    const onILS=onTrip.reduce((s,e)=>s+e.ils,0);
    const dailyAverage=daysElapsed>0?onILS/daysElapsed:0;
    let pace='preTrip';
    if(daysElapsed>0){
        if(dailyAverage<dailyBudget*0.9)pace='under';
        else if(dailyAverage<=dailyBudget*1.1)pace='at';
        else pace='over';
    }
    return{dailyBudget,dailyAverage,daysElapsed,totalDays,pace};
}
function renderBudgetData(){

async function submitCashReconcile(){
    const rawNew=parseFloat(document.getElementById('cr-amt').value);
    if(isNaN(rawNew)||rawNew<0){showToast('נדרש סכום תקין','⚠️');return;}
    const cur=document.getElementById('cr-cur').value;
    // Recompute expected balance from Sheet data at submit time (no cached/localStorage value).
    const all=(DB.expenses||[]).map((e,i)=>parseExp(e,i));
    const cb=computeCashBalance(all);
    // Convert new balance to PHP for comparison
    const newPHP=cur==='PHP'?rawNew:cur==='ILS'?convertFromILS(rawNew,'PHP'):convertFromILS(convertToILS(rawNew,'USD'),'PHP');
    const unaccountedPHP=cb.balancePHP-newPHP;
    if(unaccountedPHP>0.5){
        // Unaccounted cash was spent over some span of days — let the user pick how many.
        const unaccountedInCur=cur==='PHP'?unaccountedPHP:cur==='ILS'?convertToILS(unaccountedPHP,'PHP'):convertFromILS(convertToILS(unaccountedPHP,'PHP'),'USD');
        showCashSpreadStep(unaccountedInCur,cur);
        return;
    } else {
        // Balance matches or user has more — silent update (no record to adjust, since withdrawals/expenses are fixed)
        // We record a zero-sum "adjustment" withdrawal so future reconciliations align.
        const diffPHP=newPHP-cb.balancePHP;
        if(diffPHP>0.5){
            const diffInCur=cur==='PHP'?diffPHP:cur==='ILS'?convertToILS(diffPHP,'PHP'):convertFromILS(convertToILS(diffPHP,'PHP'),'USD');
            const locked=lockRates(diffInCur,cur);

}
// Smart default: days since the most recent cash_withdrawal OR "הוצאות מזומן כלליות".
function computeSmartSpreadDays(){
    const parsed=(DB.expenses||[]).map((e,i)=>parseExp(e,i));
    const candidates=parsed.filter(e=>e.type==='cash_withdrawal'||e.desc==='הוצאות מזומן כלליות');
    if(!candidates.length)return 1;
    const parseDate=s=>{const p=(s||'').split('/');if(p.length!==3)return null;const d=new Date(+p[2],+p[1]-1,+p[0]);return isNaN(d)?null:d;};
    let mostRecent=null;
    for(const c of candidates){const d=parseDate(c.date);if(d&&(!mostRecent||d>mostRecent))mostRecent=d;}
    if(!mostRecent)return 1;
    const today=new Date();today.setHours(0,0,0,0);mostRecent.setHours(0,0,0,0);
    const diff=Math.round((today-mostRecent)/86400000);
    return Math.max(1,Math.min(30,diff||1));
}
// Step-3 UI: show the unaccounted total and let user pick how many days to spread across.
function showCashSpreadStep(amtInCur,cur){
    const def=computeSmartSpreadDays();
    const body=document.getElementById('sheet-body');
    if(!body)return;
    body.innerHTML=`
        <div class="cw-big">${fmtMoney(amtInCur,cur)} הוצאו ולא דווחו</div>
        <div class="spread-lbl">על כמה ימים לפזר?</div>
        <div class="spread-row">
            <button class="spread-btn" id="sp-minus" onclick="adjustSpreadDays(-1)">−</button>
            <div class="spread-num" id="sp-days">${def}</div>
            <button class="spread-btn" id="sp-plus" onclick="adjustSpreadDays(1)">+</button>
        </div>
        <div class="spread-range" id="sp-range"></div>
        <input type="hidden" id="sp-amt" value="${amtInCur}">
        <input type="hidden" id="sp-cur" value="${cur}">
        <button class="btn-primary" onclick="confirmCashSpread()">עדכון</button>
    `;
    updateSpreadRange();
}
function adjustSpreadDays(delta){
    const el=document.getElementById('sp-days');if(!el)return;
    const cur=parseInt(el.textContent)||1;
    const next=Math.max(1,Math.min(30,cur+delta));
    el.textContent=next;
    const minus=document.getElementById('sp-minus'),plus=document.getElementById('sp-plus');
    if(minus)minus.disabled=next<=1;
    if(plus)plus.disabled=next>=30;
    updateSpreadRange();
}
function updateSpreadRange(){
    const el=document.getElementById('sp-days'),range=document.getElementById('sp-range');
    if(!el||!range)return;
    const days=parseInt(el.textContent)||1;
    const minus=document.getElementById('sp-minus'),plus=document.getElementById('sp-plus');
    if(minus)minus.disabled=days<=1;
    if(plus)plus.disabled=days>=30;
    if(days===1){range.textContent='יום (היום בלבד)';return;}
    const today=new Date();
    const start=new Date(today);start.setDate(today.getDate()-(days-1));
    const f=d=>`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    range.textContent=`ימים (מ-${f(start)} עד היום)`;
}
async function confirmCashSpread(){
    const daysEl=document.getElementById('sp-days'),amtEl=document.getElementById('sp-amt'),curEl=document.getElementById('sp-cur');
    if(!daysEl||!amtEl||!curEl)return;
    const days=parseInt(daysEl.textContent)||1;
    const totalAmt=parseFloat(amtEl.value);
    const cur=curEl.value;
    if(!(totalAmt>0)||!days){showToast('שגיאה בחישוב','⚠️');return;}
    // Split evenly, put remainder (in cents) on today so the sum matches the total exactly.
    const totalCents=Math.round(totalAmt*100);
    const baseCents=Math.floor(totalCents/days);
    const remCents=totalCents-baseCents*days;
    const today=new Date();
    const expenses=[];
    for(let i=0;i<days;i++){
        const d=new Date(today);d.setDate(today.getDate()-i);
        const dateF=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        const cents=i===0?baseCents+remCents:baseCents;
        const amt=cents/100;
        const locked=lockRates(amt,cur);
        expenses.push({Date:dateF,Description:'הוצאות מזומן כלליות',Amount:amt,Currency:cur,Category:'שונות',Who:'Both',Type:'on',...locked,Origin_Cur:cur,PaymentMethod:'cash'});
    }
    if(!DB.expenses)DB.expenses=[];
    for(const e of expenses)DB.expenses.push(e);
    setCooldown('expenses');saveCache();closeSheet();renderBudgetData();
    if(days===1)showToast(`נרשמה הוצאה של ${fmtMoney(totalAmt,cur)} שלא דווחה`,'💵');
    else showToast(`נרשמו ${days} הוצאות על פני ${days} ימים`,'💵');
    // POST sequentially so we don't hammer the Apps Script endpoint.
    for(const e of expenses){
        try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'addExpense',data:e})});}catch(err){}
    }
}

    filtered.forEach(r=>{const c=r['Category']||'שונות';if(!PACK_CAT_MAP[c]){if(!cats[c])cats[c]=[];cats[c].push(r);}});

    const orderedKeys=getOrderedCatKeys(cats);

            <button class="pack-tab ${currentPackWho==='critical'?'active':''}" onclick="setPackWho('critical')">🔴 קריטי (${critC})</button>
        </div>

        ${orderedKeys.length===0?'<div class="empty"><div class="empty-icon">🧳</div><div style="font-weight:600;color:var(--text-2);margin-bottom:4px">אין פריטים בסינון הנוכחי</div>נסו לבחור סינון אחר למעלה</div>':''}
        ${allDone&&totalI>0?'<div class="celebrate"><div class="celebrate-emoji">🎉</div><div class="celebrate-txt">הכל ארוז! מוכנים להמריא</div></div>':''}
        ${orderedKeys.map((cat,ci)=>{
            const items=cats[cat];

                    <button onclick="event.stopPropagation();movePackCat('${esc(cat)}',-1)" ${ci===0?'disabled style="opacity:.2"':''}>▲</button>

function setPackWho(w){currentPackWho=w;renderPackingSection();}
function togglePackCat(cat){collapsedCats[cat]=!collapsedCats[cat];renderPackingSection();}

function movePackCat(cat,dir){
    const data=DB.packing||[];
    const all=data.map((r,i)=>({...r,_row:i+2}));
    let filtered=all;
    if(currentPackWho==='tom') filtered=all.filter(r=>r['Who']==='Tom');
    else if(currentPackWho==='dani') filtered=all.filter(r=>r['Who']==='Dani'||r['Who']==='Daniella');
    else if(currentPackWho==='shared') filtered=all.filter(r=>r['Who']!=='Tom'&&r['Who']!=='Dani'&&r['Who']!=='Daniella');
    else if(currentPackWho==='critical') filtered=all.filter(r=>isCritical(r));
    const cats={};
    PACK_CATS.forEach(c=>{if(filtered.some(r=>(r['Category']||'שונות')===c.id))cats[c.id]=true;});
    filtered.forEach(r=>{const c=r['Category']||'שונות';if(!PACK_CAT_MAP[c])cats[c]=true;});
    const keys=getOrderedCatKeys(cats);
    const idx=keys.indexOf(cat);
    if(idx<0)return;
    const swapIdx=idx+dir;
    if(swapIdx<0||swapIdx>=keys.length)return;
    [keys[idx],keys[swapIdx]]=[keys[swapIdx],keys[idx]];
    savePackCatOrder(keys);
    renderPackingSection();
}

function pickPackCat(btn,id){packSelCat=id;document.querySelectorAll('#pack-cat-grid .cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function pickPackWho(btn,w){packSelWho=w;document.querySelectorAll('#sheet-body .seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function togglePackCrit(){packSelCrit=!packSelCrit;const btn=document.getElementById('pack-crit-btn');if(btn){btn.textContent=(packSelCrit?'🔴':'⚪')+' '+(packSelCrit?'פריט קריטי':'סימון כקריטי');btn.style.background=packSelCrit?'rgba(255,59,48,.1)':'var(--gray-6)';btn.style.color=packSelCrit?'var(--red)':'var(--blue)';}}

async function submitPackItem(){
    const name=(document.getElementById('pack-name-inp')?.value||'').trim();
    if(!name){showToast('נדרש שם פריט','⚠️');return;}
    const who=packSelWho==='Dani'?'Dani':packSelWho;
    const critVal=packSelCrit?'TRUE':'FALSE';
    if(editPackRow){
        const idx=editPackRow-2;
        if(DB.packing&&DB.packing[idx]){
            DB.packing[idx]['Item']=name;DB.packing[idx]['Category']=packSelCat;
            DB.packing[idx]['Who']=who;DB.packing[idx]['Critical']=critVal;
            setCooldown('packing');saveCache();
        }
        const rowN=editPackRow;closeSheet();renderPackingSection();showToast('פריט עודכן');
        try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'editPackingItem',data:{row:rowN,Item:name,Category:packSelCat,Who:who,Critical:packSelCrit}})});}catch(e){}
    }else{

        DB.packing.push({Item:name,Category:packSelCat,Packed:'FALSE',Who:who,Critical:critVal});
        setCooldown('packing');saveCache();closeSheet();renderPackingSection();showToast('פריט נוסף');
        setTimeout(()=>{const items=document.querySelectorAll('.pack-item');if(items.length){items[items.length-1].classList.add('new-item');}},50);
        try{await fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'addPackingItem',data:{Item:name,Category:packSelCat,Who:who,Critical:critVal}})});}catch(e){}
    }
}

async function togglePackItem(row){
    const idx=row-2;if(DB.packing&&DB.packing[idx]){
        const cur=(DB.packing[idx]['Packed']||'').toUpperCase()==='TRUE';DB.packing[idx]['Packed']=cur?'FALSE':'TRUE';

async function deletePackItem(row,name){

const CSYM={USD:'$',ILS:'₪',PHP:'₱'},CNAME={USD:'דולר',ILS:'שקל',PHP:'פזו'};
function renderConverterSection(){
    const main=document.getElementById('main');
    if(!exchangeRates){main.innerHTML='<div class="section"><div class="section-title">💱 המרת מטבעות</div><div class="loading"><div class="spinner"></div><div>טוענים שערים...</div></div></div>';return;}
    main.innerHTML=`<div class="section"><div class="section-title">💱 המרת מטבעות</div>
        <div class="conv-card">
            <div class="conv-display">
                <div class="conv-amount" id="cv-amt-display">$0</div>
                <div class="conv-label" id="cv-lbl">הזנת סכום להמרה</div>
            </div>
            <div class="conv-from">
                <input type="number" class="conv-inp" id="cv-amt" placeholder="0" inputmode="decimal">
                <select class="conv-sel" id="cv-from"><option value="USD">$ USD</option><option value="ILS">₪ ILS</option><option value="PHP">₱ PHP</option></select>
            </div>
            <div class="conv-swap"><button onclick="swapConv()">⇅</button></div>
            <div class="conv-to">
                <div class="conv-inp" id="cv-out" style="color:var(--blue)">—</div>
                <select class="conv-sel" id="cv-to"><option value="ILS">₪ ILS</option><option value="USD">$ USD</option><option value="PHP">₱ PHP</option></select>
            </div>
            <div class="conv-quick" id="cv-quick"></div>
            <div class="conv-rate" id="cv-rate"></div>
        </div>
    </div>`;
    document.getElementById('cv-amt').addEventListener('input',doConv);
    document.getElementById('cv-from').addEventListener('change',()=>{updateQuickAmt();doConv();});
    document.getElementById('cv-to').addEventListener('change',doConv);
    updateQuickAmt();
    if(ratesLastUpdated){const d=new Date(ratesLastUpdated);document.getElementById('cv-rate').textContent=`שערים עודכנו: ${d.toLocaleDateString('he-IL')} ${d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}`;}
}
function updateQuickAmt(){
    const from=document.getElementById('cv-from').value;const a=from==='USD'?[10,50,100,500]:from==='ILS'?[50,100,500,1000]:[500,1000,5000,10000];
    document.getElementById('cv-quick').innerHTML=a.map(v=>`<button class="conv-quick-btn" onclick="document.getElementById('cv-amt').value=${v};doConv()">${CSYM[from]}${v.toLocaleString()}</button>`).join('');
}
function doConv(){
    const from=document.getElementById('cv-from').value,to=document.getElementById('cv-to').value,amt=parseFloat(document.getElementById('cv-amt').value);
    const o=document.getElementById('cv-out'),disp=document.getElementById('cv-amt-display'),lbl=document.getElementById('cv-lbl');
    if(!amt||!exchangeRates){o.textContent='—';disp.textContent=CSYM[to]+'0';lbl.textContent='הזנת סכום להמרה';return;}
    const res=(amt/exchangeRates[from])*exchangeRates[to];
    const resFmt=CSYM[to]+(Math.round(res*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    o.textContent=resFmt;disp.textContent=resFmt;
    const rate=exchangeRates[to]/exchangeRates[from];
    lbl.textContent=`${CSYM[from]}1 = ${CSYM[to]}${rate.toFixed(4)} · ${CNAME[from]} ל${CNAME[to]}`;
}
function swapConv(){const f=document.getElementById('cv-from'),t=document.getElementById('cv-to'),tmp=f.value;f.value=t.value;t.value=tmp;updateQuickAmt();doConv();}
